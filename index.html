<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Todo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ec;
      --surface: #fffdfa;
      --line: #ddd4c3;
      --line-strong: #b8aa93;
      --text: #241f1a;
      --muted: #706759;
      --accent: #256d85;
      --accent-soft: #d9eef2;
      --complete: #2f7d4f;
      --shadow: 0 18px 48px rgba(50, 42, 30, 0.14);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(37, 109, 133, 0.08), transparent 220px),
        var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(920px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 52px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0 14px;
      background: linear-gradient(180deg, rgba(247, 244, 236, 0.96), rgba(247, 244, 236, 0.86));
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 780;
    }

    .date-stamp {
      color: var(--muted);
      font-size: 15px;
      white-space: nowrap;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .add-button,
    .completed-button,
    .help-button {
      width: 46px;
      height: 46px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 7px 18px rgba(42, 34, 24, 0.1);
    }

    .add-button {
      font-size: 0;
    }

    .completed-button {
      position: relative;
    }

    .add-button:hover,
    .add-button:focus-visible,
    .completed-button:hover,
    .completed-button:focus-visible,
    .help-button:hover,
    .help-button:focus-visible {
      border-color: var(--accent);
      outline: 3px solid rgba(37, 109, 133, 0.18);
    }

    .add-button svg,
    .completed-button svg,
    .help-button svg {
      width: 24px;
      height: 24px;
      stroke-width: 2.4;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
      padding: 4px 2px 14px;
    }

    .status.error {
      color: #9b2c20;
    }

    .groups {
      display: grid;
      gap: 12px;
    }

    .day {
      background: rgba(255, 253, 250, 0.78);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 26px rgba(62, 50, 35, 0.08);
    }

    .day-header {
      width: 100%;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 56px;
      padding: 0 18px;
      cursor: pointer;
      color: var(--text);
      text-align: left;
    }

    .day-header:hover,
    .day-header:focus-visible {
      outline: none;
      background: rgba(37, 109, 133, 0.07);
    }

    .day-header.selected {
      background: var(--accent-soft);
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .day-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 760;
      font-size: 18px;
    }

    .chevron {
      width: 16px;
      height: 16px;
      transition: transform 150ms ease;
      flex: 0 0 auto;
    }

    .day.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .day-count {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .todo-list {
      display: grid;
      gap: 1px;
      padding: 0 10px 10px;
    }

    .day.collapsed .todo-list {
      display: none;
    }

    .todo {
      position: relative;
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      min-height: 48px;
      border-radius: 8px;
      padding: 3px 80px 3px 8px;
      background: transparent;
      border: 1px solid transparent;
      cursor: grab;
      user-select: none;
    }

    .todo:hover {
      background: rgba(36, 31, 26, 0.04);
    }

    .todo.selected {
      background: var(--accent-soft);
      border-color: rgba(37, 109, 133, 0.42);
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .todo.dragging {
      opacity: 0.48;
      cursor: grabbing;
    }

    .todo.editing {
      cursor: default;
      user-select: text;
    }

    .todo.drop-before::before,
    .todo.drop-after::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent);
      pointer-events: none;
    }

    .todo.drop-before::before {
      top: -2px;
    }

    .todo.drop-after::after {
      bottom: -2px;
    }

    .todo.drop-target {
      background: rgba(37, 109, 133, 0.08);
    }

    .todo-list.drop-empty {
      outline: 2px dashed rgba(37, 109, 133, 0.35);
      outline-offset: -6px;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--line-strong);
      border-radius: 4px;
      background: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
    }

    .checkbox:hover,
    .checkbox:focus-visible {
      border-color: var(--complete);
      outline: 3px solid rgba(47, 125, 79, 0.16);
    }

    .todo-text {
      font-size: 17px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .todo-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 7px 10px;
      background: #fff;
      color: var(--text);
      font-size: 17px;
      line-height: 1.35;
    }

    .todo-input:focus {
      outline: 3px solid rgba(37, 109, 133, 0.2);
      border-color: var(--accent);
    }

    .todo-actions {
      position: absolute;
      top: 50%;
      right: 8px;
      display: flex;
      gap: 4px;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease;
    }

    .todo-action {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 6px;
      background: rgba(37, 109, 133, 0.1);
      color: var(--accent);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: opacity 140ms ease, background 140ms ease, color 140ms ease;
    }

    .todo:hover .todo-actions,
    .todo.selected .todo-actions,
    .todo:focus-within .todo-actions {
      opacity: 1;
      pointer-events: auto;
    }

    .todo-action:hover,
    .todo-action:focus-visible {
      background: rgba(37, 109, 133, 0.18);
      outline: 3px solid rgba(37, 109, 133, 0.16);
    }

    .empty {
      padding: 7px 10px 12px 42px;
      color: var(--muted);
      font-size: 15px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(36, 31, 26, 0.34);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 58px;
      padding: 0 16px 0 20px;
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      font-weight: 760;
      font-size: 19px;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--text);
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      background: rgba(36, 31, 26, 0.06);
      outline: 3px solid rgba(37, 109, 133, 0.14);
    }

    .modal-body {
      padding: 18px 20px 20px;
      display: grid;
      gap: 14px;
    }

    .help-modal {
      width: min(760px, 100%);
      max-height: min(78vh, 820px);
      display: flex;
      flex-direction: column;
    }

    .help-head {
      align-items: flex-start;
      gap: 12px;
      padding-top: 12px;
      padding-bottom: 12px;
    }

    .help-title-wrap {
      min-width: 0;
      display: grid;
      gap: 4px;
      padding: 4px 0;
    }

    .help-subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .help-head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .help-mode-button {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .help-mode-button:hover,
    .help-mode-button:focus-visible {
      border-color: var(--accent);
      background: rgba(37, 109, 133, 0.08);
      outline: 3px solid rgba(37, 109, 133, 0.16);
    }

    .help-content {
      padding: 18px 20px 20px;
      display: grid;
      gap: 18px;
      overflow: auto;
    }

    .help-section {
      display: grid;
      gap: 8px;
    }

    .help-section h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
    }

    .help-section ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 7px;
    }

    .help-section li {
      line-height: 1.55;
      color: var(--text);
    }

    .help-prompt-box {
      width: 100%;
      min-height: 420px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 12px 13px;
      background: #fbf8f1;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      line-height: 1.55;
      resize: vertical;
    }

    .help-prompt-box:focus {
      outline: 3px solid rgba(37, 109, 133, 0.2);
      border-color: var(--accent);
    }

    .daily-panel {
      min-height: 116px;
      max-height: 190px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbf8f1;
      padding: 10px 12px;
    }

    .daily-panel-title {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .daily-items {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .daily-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
      min-height: 30px;
    }

    .daily-task-text {
      font-size: 15px;
      line-height: 1.35;
      overflow-wrap: anywhere;
      padding-top: 3px;
    }

    .daily-count-button {
      min-width: 122px;
      min-height: 30px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 7px;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: pre;
      cursor: pointer;
    }

    .daily-count-button:hover,
    .daily-count-button:focus-visible {
      background: rgba(37, 109, 133, 0.1);
      border-color: rgba(37, 109, 133, 0.2);
      outline: 3px solid rgba(37, 109, 133, 0.14);
    }

    .daily-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .daily-action,
    .daily-delete {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .daily-action:hover,
    .daily-action:focus-visible,
    .daily-delete:hover,
    .daily-delete:focus-visible {
      background: rgba(37, 109, 133, 0.1);
      color: var(--accent);
      outline: 3px solid rgba(37, 109, 133, 0.14);
    }

    .daily-action.active {
      background: rgba(37, 109, 133, 0.16);
      color: var(--accent);
    }

    .daily-delete:hover,
    .daily-delete:focus-visible {
      background: rgba(155, 44, 32, 0.1);
      color: #9b2c20;
      outline: 3px solid rgba(155, 44, 32, 0.14);
    }

    .daily-empty {
      color: var(--muted);
      font-size: 15px;
    }

    .checkin-modal {
      width: min(520px, 100%);
      max-height: min(78vh, 760px);
      display: flex;
      flex-direction: column;
    }

    .checkin-body {
      padding: 16px 20px 20px;
      display: grid;
      gap: 12px;
      overflow: hidden;
    }

    .checkin-summary {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .checkin-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
      max-height: min(48vh, 430px);
      overflow: auto;
      padding-right: 2px;
    }

    .checkin-weekday {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 2px 0;
    }

    .checkin-spacer {
      min-height: 42px;
    }

    .checkin-day {
      min-width: 0;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      display: grid;
      place-items: center;
      gap: 1px;
      padding: 3px 2px;
      cursor: pointer;
    }

    .checkin-day:hover,
    .checkin-day:focus-visible {
      border-color: var(--accent);
      outline: 3px solid rgba(37, 109, 133, 0.14);
    }

    .checkin-day.checked {
      border-color: rgba(47, 125, 79, 0.42);
      background: rgba(47, 125, 79, 0.1);
      color: var(--complete);
    }

    .checkin-day.today {
      box-shadow: inset 0 0 0 2px rgba(37, 109, 133, 0.2);
    }

    .checkin-date {
      font-size: 15px;
      line-height: 1.1;
      font-weight: 760;
      font-variant-numeric: tabular-nums;
    }

    .checkin-mark {
      min-height: 13px;
      font-size: 12px;
      line-height: 1;
    }

    .completed-modal {
      width: min(720px, 100%);
      max-height: min(78vh, 820px);
      display: flex;
      flex-direction: column;
    }

    .completed-body {
      padding: 16px 20px 20px;
      display: grid;
      gap: 12px;
      overflow: hidden;
    }

    .completed-summary {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .completed-list {
      display: grid;
      gap: 7px;
      max-height: min(55vh, 520px);
      overflow: auto;
      padding-right: 2px;
    }

    .completed-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbf8f1;
    }

    .completed-text {
      font-size: 16px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .completed-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .restore-button {
      min-width: 76px;
      min-height: 34px;
      border: 1px solid rgba(37, 109, 133, 0.34);
      border-radius: 8px;
      background: #fff;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    .restore-button:hover,
    .restore-button:focus-visible {
      background: rgba(37, 109, 133, 0.1);
      outline: 3px solid rgba(37, 109, 133, 0.14);
    }

    .completed-empty {
      min-height: 120px;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      color: var(--muted);
      display: grid;
      place-items: center;
      padding: 18px;
      text-align: center;
      line-height: 1.45;
    }

    .new-input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 0 13px;
      background: white;
      color: var(--text);
    }

    .new-input:focus {
      outline: 3px solid rgba(37, 109, 133, 0.2);
      border-color: var(--accent);
    }

    .form-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .date-select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 0 11px;
      background: white;
      color: var(--text);
    }

    .create-button {
      min-width: 92px;
      min-height: 42px;
      border: 1px solid #1d596d;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .create-button:hover,
    .create-button:focus-visible {
      background: #1d596d;
      outline: 3px solid rgba(37, 109, 133, 0.22);
    }

    @media (max-width: 560px) {
      .app {
        width: min(100vw - 20px, 920px);
        padding-top: 10px;
      }

      .brand {
        display: grid;
        gap: 5px;
      }

      .topbar-actions {
        gap: 6px;
      }

      .date-stamp {
        font-size: 13px;
      }

      .day-header {
        padding: 0 12px;
      }

      .day-title {
        font-size: 16px;
      }

      .todo {
        grid-template-columns: 32px 1fr;
        min-height: 46px;
        padding-right: 72px;
      }

      .todo-text {
        font-size: 16px;
      }

      .todo-input {
        font-size: 16px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .daily-row {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .completed-item {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .restore-button {
        width: 100%;
      }

      .daily-actions {
        grid-column: 2;
        grid-row: 1;
      }

      .daily-count-button {
        grid-column: 1 / -1;
        grid-row: 2;
        justify-content: flex-start;
        min-width: 0;
      }

      .create-button {
        width: 100%;
      }
    }

    /* 2026-07 restrained UI polish: kept as one removable override block. */
    :root {
      --bg: #f3f5f3;
      --surface: #ffffff;
      --line: #dce2de;
      --line-strong: #b7c2bc;
      --text: #202723;
      --muted: #66716b;
      --accent: #256d85;
      --accent-soft: #e2f0f3;
      --complete: #2f7d4f;
      --shadow: 0 24px 64px rgba(35, 48, 41, 0.18);
    }

    body {
      background:
        radial-gradient(circle at 50% -120px, rgba(37, 109, 133, 0.11), transparent 430px),
        linear-gradient(180deg, #f7f9f7 0, var(--bg) 360px);
    }

    .app {
      width: min(940px, calc(100vw - 32px));
      padding: 18px 0 64px;
    }

    .topbar {
      top: 0;
      padding: 12px 2px 14px;
      border: 0;
      border-radius: 0;
      background: linear-gradient(180deg, rgba(247, 249, 247, 0.97), rgba(243, 245, 243, 0.9));
      box-shadow: none;
      backdrop-filter: blur(16px) saturate(1.08);
    }

    h1 {
      font-size: clamp(30px, 4vw, 40px);
      letter-spacing: -0.045em;
    }

    .date-stamp {
      color: #758079;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    .add-button,
    .completed-button,
    .help-button {
      width: 42px;
      height: 42px;
      border-color: var(--line);
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(35, 48, 41, 0.07);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .add-button:hover,
    .completed-button:hover,
    .help-button:hover {
      transform: translateY(-1px);
      background: #f8fbfa;
      box-shadow: 0 7px 18px rgba(35, 48, 41, 0.1);
    }

    .status {
      min-height: 34px;
      padding: 8px 4px 10px;
      font-size: 13px;
    }

    .groups {
      gap: 14px;
    }

    .day {
      border-color: rgba(183, 194, 188, 0.72);
      border-radius: 14px;

      "- GET /api/completed?today=YYYY-MM-DD&limit=100 返回 { today, total, limit, todos }；todos 只包含普通已完成任务，字段为 id, text, dueDate, completedAt, createdAt。",
      "- POST /api/todos body: { text, dueDate, today }。",
      "- POST /api/daily-tasks body: { text, today, days }。",
      "- POST /api/daily-tasks/delete body: { id }。",
      "- POST /api/todos/complete body: { id, today }。",
      "- POST /api/todos/restore body: { id, today }。",
      "- POST /api/todos/update body: { id, text, today }。",
      "- POST /api/todos/top body: { id, today }。",
      "- POST /api/todos/bottom body: { id, today }。",
      "- POST /api/todos/move body: { id, direction, today }。",
      "- POST /api/daily-tasks/placement body: { id, placement }。",
      "- POST /api/daily-tasks/checkin body: { id, date, checked, today }。",
      "- 出错时返回 { error }，前端把错误展示到状态栏。",
      "",
      "6. 数据字段",
      "- todo: id, text, dueDate, sortOrder, sourceDailyTaskId, createdAt, manualSort, completedAt。",
      "- dailyTask: id, text, sortOrder, placement, startDate, completedCount, totalCount, completionPercent, checkins, createdAt。",
      "",
      "请直接输出完整实现代码，默认中文界面，交互细节严格按以上规则落地。"
    ].join("\n");

    const state = {
      today: toLocalDateString(new Date()),
      todos: [],
      dailyTasks: [],
      completedTodos: [],
      completedCount: 0,
      collapsed: loadCollapsed(),
      selected: null,
      editingId: null,
      editingText: "",
      pendingEditFocusId: null,
      helpMode: "manual",
      checkinTaskId: null,
      loading: false,
      draggingId: null,
      dropTargetId: null,
      dropSide: null,
      dropDate: null,
    };

    const els = {
      groups: document.getElementById("groups"),
      status: document.getElementById("status"),
      todayLabel: document.getElementById("todayLabel"),
      openHelp: document.getElementById("openHelp"),
      openCompleted: document.getElementById("openCompleted"),
      openNew: document.getElementById("openNew"),
      closeNew: document.getElementById("closeNew"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      helpBackdrop: document.getElementById("helpBackdrop"),
      checkinBackdrop: document.getElementById("checkinBackdrop"),
      completedBackdrop: document.getElementById("completedBackdrop"),
      helpTitle: document.getElementById("helpTitle"),
      helpSubtitle: document.getElementById("helpSubtitle"),
      toggleHelpMode: document.getElementById("toggleHelpMode"),
      closeHelp: document.getElementById("closeHelp"),
      helpContent: document.getElementById("helpContent"),
      closeCheckin: document.getElementById("closeCheckin"),
      checkinTitle: document.getElementById("checkinTitle"),
      checkinSummary: document.getElementById("checkinSummary"),
      checkinGrid: document.getElementById("checkinGrid"),
      closeCompleted: document.getElementById("closeCompleted"),
      completedSummary: document.getElementById("completedSummary"),
      completedList: document.getElementById("completedList"),
      newForm: document.getElementById("newForm"),
      newText: document.getElementById("newText"),
      dateSelect: document.getElementById("dateSelect"),
      dailyItems: document.getElementById("dailyItems"),
    };

    els.todayLabel.textContent = formatFullDate(state.today);
    els.openHelp.addEventListener("click", openHelp);
    els.openCompleted.addEventListener("click", openCompleted);
    els.openNew.addEventListener("click", openModal);
    els.closeNew.addEventListener("click", closeModal);
    els.modalBackdrop.addEventListener("mousedown", (event) => {
      if (event.target === els.modalBackdrop) closeModal();
    });
    els.helpBackdrop.addEventListener("mousedown", (event) => {
      if (event.target === els.helpBackdrop) closeHelp();
    });
    els.checkinBackdrop.addEventListener("mousedown", (event) => {
      if (event.target === els.checkinBackdrop) closeCheckin();
    });
    els.completedBackdrop.addEventListener("mousedown", (event) => {
      if (event.target === els.completedBackdrop) closeCompleted();
    });
    els.toggleHelpMode.addEventListener("click", toggleHelpMode);
    els.closeHelp.addEventListener("click", closeHelp);
    els.closeCheckin.addEventListener("click", closeCheckin);
    els.closeCompleted.addEventListener("click", closeCompleted);
    els.newForm.addEventListener("submit", submitNewItem);
    document.addEventListener("keydown", handleKeys);

    renderDateOptions();
    renderHelpContent();
    refresh();

    async function refresh(options = {}) {
      setStatus("同步中...");
      try {
        state.loading = true;
        const data = await apiGet(`/api/state?today=${state.today}&days=${DAY_COUNT}`);
        state.todos = Array.isArray(data.todos) ? data.todos : [];
        state.dailyTasks = Array.isArray(data.dailyTasks) ? data.dailyTasks : [];
        state.completedCount = Number(data.completedCount) || 0;
        renderCompletedBadge();
        ensureSelected(options.preferId);
        render();
        setStatus("已同步");
      } catch (error) {
        setStatus("同步失败：" + error.message, true);
      } finally {
        state.loading = false;
      }
    }

    function render() {
      renderDailyTasks();
      els.groups.innerHTML = "";
      renderGroup({
        key: SHOPPING_GROUP,
        label: "购物清单",
        todos: todosForGroup(SHOPPING_GROUP),
        offset: null,
      });
      for (let offset = 0; offset < DAY_COUNT; offset++) {
        const date = addDays(state.today, offset);
        renderGroup({
          key: date,
          label: groupLabel(date, offset),
          todos: todosForGroup(date),
          offset,
        });
      }
      focusEditingInput();
    }

    function renderCompletedBadge() {
      const count = Number(state.completedCount) || 0;
      els.openCompleted.title = count > 0 ? `已完成 ${count} 项` : "已完成";
      els.openCompleted.setAttribute("aria-label", count > 0 ? `打开已完成任务，共 ${count} 项` : "打开已完成任务");
    }

    function renderGroup({ key, label, todos, offset }) {
      const day = document.createElement("article");
      day.className = "day";
      day.dataset.date = key;

      if (offset === 0) day.classList.add("today-group");
      if (isCollapsed(key, offset)) day.classList.add("collapsed");

      const header = document.createElement("button");
      header.className = "day-header";
      if (isSelectedGroup(key)) header.classList.add("selected");
      header.type = "button";
      header.innerHTML = `
        <span class="day-title">
          <svg class="chevron" viewBox="0 0 20 20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 4l8 6-8 6"></path>
          </svg>
          <span>${escapeHtml(label)}</span>
        </span>
        <span class="day-count">${todos.length} 项</span>
      `;
      header.addEventListener("click", () => {
        selectGroup(key, { renderNow: false });
        toggleGroup(key);
      });
      day.appendChild(header);

      const list = document.createElement("div");
      list.className = "todo-list";
      list.dataset.date = key;
      list.addEventListener("dragover", handleDragOver);
      list.addEventListener("drop", handleDrop);

      if (todos.length) {
        for (const todo of todos) list.appendChild(renderTodo(todo));
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "没有待办事项";
        list.appendChild(empty);
      }

      day.appendChild(list);
      els.groups.appendChild(day);
    }

    function renderTodo(todo) {
      const row = document.createElement("div");
      const isEditing = todo.id === state.editingId;
      row.className = "todo";
      if (isSelectedTodo(todo.id)) row.classList.add("selected");
      if (todo.id === state.draggingId) row.classList.add("dragging");
      if (isEditing) row.classList.add("editing");
      row.dataset.id = todo.id;
      row.draggable = !isEditing;
      row.tabIndex = -1;
      row.addEventListener("click", (event) => {
        if (!event.target.closest(".checkbox") && !event.target.closest(".todo-input") && !event.target.closest(".todo-action")) selectTodo(todo.id);
      });
      row.addEventListener("dblclick", (event) => {
        if (event.target.closest(".checkbox") || event.target.closest(".todo-input") || event.target.closest(".todo-action")) return;
        startEditingTodo(todo);
      });
      row.addEventListener("dragstart", (event) => {
        state.draggingId = todo.id;
        row.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", todo.id);
        clearDropIndicator();
      });
      row.addEventListener("dragend", () => {
        endDrag();
      });

      const checkbox = document.createElement("button");
      checkbox.className = "checkbox";
      checkbox.type = "button";
      checkbox.title = "完成（Space）";
      checkbox.setAttribute("aria-label", "完成：" + todo.text);
      checkbox.addEventListener("click", (event) => {
        event.stopPropagation();
        completeSelected(todo.id);
      });

      row.appendChild(checkbox);
      if (isEditing) {
        const input = document.createElement("input");
        input.className = "todo-input";
        input.type = "text";
        input.maxLength = 240;
        input.autocomplete = "off";
        input.value = state.editingText;
        input.setAttribute("aria-label", "编辑待办事项");
        input.addEventListener("click", (event) => event.stopPropagation());
        input.addEventListener("dblclick", (event) => event.stopPropagation());
        input.addEventListener("input", () => {
          state.editingText = input.value;
        });
        let handled = false;
        const finish = async (mode) => {
          if (handled) return;
          handled = true;
          if (mode === "save") {
            await saveEditingTodo(todo.id, todo.text);
            return;
          }
          cancelEditingTodo();
        };
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            void finish("save");
          }
          if (event.key === "Escape") {
            event.preventDefault();
            void finish("cancel");
          }
        });
        input.addEventListener("blur", () => {
          void finish("save");
        });
        row.appendChild(input);
        return row;
      }

      const text = document.createElement("div");
      text.className = "todo-text";
      text.textContent = todo.text;
      row.appendChild(text);

      const actions = document.createElement("div");
      actions.className = "todo-actions";

      const pinTop = document.createElement("button");
      pinTop.className = "todo-action";
      pinTop.type = "button";
      pinTop.title = "置顶（1）";
      pinTop.setAttribute("aria-label", "置顶：" + todo.text);
      pinTop.innerHTML = `
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 18V6"></path>
          <path d="M7 11l5-5 5 5"></path>
          <path d="M5 4h14"></path>
        </svg>
      `;
      pinTop.addEventListener("click", (event) => {
        event.stopPropagation();
        void moveTodoToEdge(todo.id, "top");
      });

      const pinBottom = document.createElement("button");
      pinBottom.className = "todo-action";
      pinBottom.type = "button";
      pinBottom.title = "置底（2）";
      pinBottom.setAttribute("aria-label", "置底：" + todo.text);
      pinBottom.innerHTML = `
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 6v12"></path>
          <path d="M7 13l5 5 5-5"></path>
          <path d="M5 20h14"></path>
        </svg>
      `;
      pinBottom.addEventListener("click", (event) => {
        event.stopPropagation();
        void moveTodoToEdge(todo.id, "bottom");
      });

      actions.appendChild(pinTop);
      actions.appendChild(pinBottom);
      row.appendChild(actions);
      return row;
    }

    function renderDailyTasks() {
      els.dailyItems.innerHTML = "";
      if (!state.dailyTasks.length) {
        const empty = document.createElement("li");
        empty.className = "daily-empty";
        empty.textContent = "暂无每日任务";
        els.dailyItems.appendChild(empty);
        return;
      }
      for (const task of state.dailyTasks) {
        const item = document.createElement("li");
        item.className = "daily-row";

        const text = document.createElement("div");
        text.className = "daily-task-text";
        text.textContent = task.text;

        const count = document.createElement("button");
        count.className = "daily-count-button";
        count.type = "button";
        count.dataset.taskId = task.id;
        count.textContent = formatDailyTaskStats(task);
        count.title = "补打卡";
        count.setAttribute("aria-label", "补打卡：" + task.text + "，" + count.textContent.trim());
        count.addEventListener("click", () => openCheckin(task));

        const actions = document.createElement("div");
        actions.className = "daily-actions";

        const top = createDailyActionButton({
          className: "daily-action" + ((task.placement || "top") === "top" ? " active" : ""),
          title: "每日任务置顶",
          label: "每日任务置顶：" + task.text,
          icon: `
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 18V6"></path>
              <path d="M7 11l5-5 5 5"></path>
              <path d="M5 4h14"></path>
            </svg>
          `,
          onClick: () => updateDailyTaskPlacement(task, "top"),
        });

        const bottom = createDailyActionButton({
          className: "daily-action" + ((task.placement || "top") === "bottom" ? " active" : ""),
          title: "每日任务置底",
          label: "每日任务置底：" + task.text,
          icon: `
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 6v12"></path>
              <path d="M7 13l5 5 5-5"></path>
              <path d="M5 20h14"></path>
            </svg>
          `,
          onClick: () => updateDailyTaskPlacement(task, "bottom"),
        });

        const remove = document.createElement("button");
        remove.className = "daily-delete";
        remove.type = "button";
        remove.title = "删除每日任务";
        remove.setAttribute("aria-label", "删除每日任务：" + task.text);
        remove.innerHTML = `
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"></path>
            <path d="M8 6V4h8v2"></path>
            <path d="M19 6l-1 14H6L5 6"></path>
            <path d="M10 11v5"></path>
            <path d="M14 11v5"></path>
          </svg>
        `;
        remove.addEventListener("click", () => deleteDailyTask(task));

        item.appendChild(text);
        item.appendChild(count);
        actions.appendChild(top);
        actions.appendChild(bottom);
        actions.appendChild(remove);
        item.appendChild(actions);
        els.dailyItems.appendChild(item);
      }
    }

    function createDailyActionButton({ className, title, label, icon, onClick }) {
      const button = document.createElement("button");
      button.className = className;
      button.type = "button";
      button.title = title;
      button.setAttribute("aria-label", label);
      button.innerHTML = icon;
      button.addEventListener("click", onClick);
      return button;
    }

    function renderDateOptions() {
      els.dateSelect.innerHTML = "";
      const daily = new Option("每天", "daily");
      els.dateSelect.add(daily);
      els.dateSelect.add(new Option("购物清单", SHOPPING_GROUP));
      for (let offset = 0; offset <= 30; offset++) {
        const date = addDays(state.today, offset);
        els.dateSelect.add(new Option(createOptionLabel(date, offset), date));
      }
      els.dateSelect.value = state.today;
    }

    function formatDailyTaskStats(task) {
      const completed = Number(task.completedCount) || 0;
      const total = Number(task.totalCount) || 0;
      const percent = total > 0 ? (completed / total) * 100 : 0;
      return `${completed}/${total}   ${percent.toFixed(2)}%`;
    }

    async function loadCompletedTodos() {
      setStatus("读取已完成...");
      try {
        const data = await apiGet(`/api/completed?today=${state.today}&limit=100`);
        state.completedCount = Number(data.total) || 0;
        state.completedTodos = Array.isArray(data.todos) ? data.todos : [];
        renderCompletedBadge();
        renderCompletedList();
        setStatus("已同步");
      } catch (error) {
        setStatus("读取已完成失败：" + error.message, true);
        state.completedTodos = [];
        renderCompletedList("读取失败，请稍后再试");
      }
    }

    function renderCompletedList(message = "") {
      const total = Number(state.completedCount) || 0;
      const visible = state.completedTodos.length;
      if (message) {
        els.completedSummary.textContent = message;
      } else if (total > 0) {
        els.completedSummary.textContent = `普通任务已完成 ${total} 项，显示最近 ${visible} 条。`;
      } else {
        els.completedSummary.textContent = "还没有已完成的普通任务。";
      }
      els.completedList.innerHTML = "";

      if (!visible) {
        const empty = document.createElement("div");
        empty.className = "completed-empty";
        empty.textContent = message || "完成普通任务后会出现在这里";
        els.completedList.appendChild(empty);
        return;
      }

      for (const todo of state.completedTodos) {
        const item = document.createElement("div");
        item.className = "completed-item";

        const content = document.createElement("div");
        const text = document.createElement("div");
        text.className = "completed-text";
        text.textContent = todo.text;

        const meta = document.createElement("div");
        meta.className = "completed-meta";
        meta.textContent = `原位置：${formatCompletedDueDate(todo.dueDate)} · 完成：${formatTimestamp(todo.completedAt)}`;

        const restore = document.createElement("button");
        restore.className = "restore-button";
        restore.type = "button";
        restore.textContent = "恢复";
        restore.title = "恢复为未完成";
        restore.setAttribute("aria-label", "恢复：" + todo.text);
        restore.addEventListener("click", () => restoreCompletedTodo(todo.id));

        content.appendChild(text);
        content.appendChild(meta);
        item.appendChild(content);
        item.appendChild(restore);
        els.completedList.appendChild(item);
      }
    }

    async function restoreCompletedTodo(id) {
      if (!id || state.loading) return;
      setStatus("恢复中...");
      state.loading = true;
      try {
        await apiPost("/api/todos/restore", { id, today: state.today });
        state.completedTodos = state.completedTodos.filter((todo) => todo.id !== id);
        state.completedCount = Math.max(0, (Number(state.completedCount) || 0) - 1);
        renderCompletedBadge();
        renderCompletedList();
        await refresh({ preferId: id });
      } catch (error) {
        setStatus("恢复失败：" + error.message, true);
        await loadCompletedTodos();
        await refresh();
      } finally {
        state.loading = false;
      }
    }

    function handleKeys(event) {
      const newModalOpen = isNewModalOpen();
      const helpModalOpen = isHelpOpen();
      const checkinOpen = isCheckinOpen();
      const completedOpen = isCompletedOpen();
      if (event.altKey && event.key.toLowerCase() === "n" && !helpModalOpen && !checkinOpen && !completedOpen) {
        event.preventDefault();
        openModal();
        return;
      }
      if (event.key === "Escape" && checkinOpen) {
        event.preventDefault();
        closeCheckin();
        return;
      }
      if (event.key === "Escape" && completedOpen) {
        event.preventDefault();
        closeCompleted();
        return;
      }
      if (event.key === "Escape" && helpModalOpen) {
        event.preventDefault();
        closeHelp();
        return;
      }
      if (event.key === "Escape" && newModalOpen) {
        event.preventDefault();
        closeModal();
        return;
      }
      if (newModalOpen || helpModalOpen || checkinOpen || completedOpen) return;
      if (isTextEntryTarget(event.target) || state.editingId) return;
      const isPinShortcut = !event.ctrlKey && !event.metaKey && !event.altKey && !event.shiftKey && (event.key === "1" || event.code === "Numpad1");
      const isBottomShortcut = !event.ctrlKey && !event.metaKey && !event.altKey && !event.shiftKey && (event.key === "2" || event.code === "Numpad2");
      const isCollapseShortcut = !event.ctrlKey && !event.metaKey && !event.altKey && !event.shiftKey && event.key.toLowerCase() === "z";
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(event.key) || isPinShortcut || isBottomShortcut || isCollapseShortcut) {
        event.preventDefault();
      }
      if (event.key === "ArrowUp") moveSelection(-1);
      if (event.key === "ArrowDown") moveSelection(1);
      if (event.key === "ArrowLeft" && selectedTodoId()) moveSelectedTodo("up");
      if (event.key === "ArrowRight" && selectedTodoId()) moveSelectedTodo("down");
      if (event.key === " ") activateSelected();
      if (isPinShortcut) moveTodoToEdge(selectedTodoId(), "top");
      if (isBottomShortcut) moveTodoToEdge(selectedTodoId(), "bottom");
      if (isCollapseShortcut) collapseSelectedTodoGroup();
    }

    function moveSelection(delta) {
      const items = navigationItems();
      if (!items.length) {
        state.selected = null;
        render();
        return;
      }
      const currentIndex = Math.max(0, items.findIndex((item) => isSameSelection(item, state.selected)));
      const nextIndex = clamp(currentIndex + delta, 0, items.length - 1);
      setSelection(items[nextIndex]);
    }

    function setSelection(selection) {
      if (!selection) {
        state.selected = null;
        render();
        return;
      }
      if (selection.type === "todo") {
        selectTodo(selection.id);
        return;
      }
      selectGroup(selection.key);
    }

    async function moveSelectedTodo(direction) {
      const id = selectedTodoId();
      if (!id || state.loading || state.editingId) return;
      optimisticallyMove(id, direction);
      render();
      try {
        await apiPost("/api/todos/move", { id, direction, today: state.today });
        await refresh({ preferId: id });
      } catch (error) {
        setStatus("移动失败：" + error.message, true);
        await refresh({ preferId: id });
      }
    }

    async function moveTodoToEdge(id, edge) {
      if (!id || state.loading || state.editingId) return;
      selectTodo(id, { renderNow: false });
      optimisticallyMoveToEdge(id, edge);
      render();
      try {
        await apiPost(edge === "bottom" ? "/api/todos/bottom" : "/api/todos/top", { id, today: state.today });
        await refresh({ preferId: id });
      } catch (error) {
        setStatus((edge === "bottom" ? "置底失败：" : "置顶失败：") + error.message, true);
        await refresh({ preferId: id });
      }
    }

    async function completeSelected(id) {
      if (!id || state.loading || state.editingId) return;
      const items = navigationItems();
      const currentIndex = Math.max(0, items.findIndex((item) => item.type === "todo" && item.id === id));
      const fallback = items[currentIndex + 1] || items[currentIndex - 1] || null;
      state.todos = state.todos.filter((todo) => todo.id !== id);
      state.selected = fallback || null;
      render();
      try {
        await apiPost("/api/todos/complete", { id, today: state.today });
        await refresh({ preferId: selectedTodoId() });
      } catch (error) {
        setStatus("完成失败：" + error.message, true);
        await refresh();
      }
    }

    function activateSelected() {
      if (isSelectedGroup()) {
        toggleGroup(state.selected.key);
        return;
      }
      completeSelected(selectedTodoId());
    }

    function collapseSelectedTodoGroup() {
      const todo = selectedTodo();
      if (!todo) return;
      const key = groupKeyForTodo(todo);
      state.collapsed[key] = true;
      saveCollapsed();
      selectGroup(key, { renderNow: false });
      render();
    }

    async function submitNewItem(event) {
      event.preventDefault();
      const text = els.newText.value.trim();
      const target = els.dateSelect.value;
      if (!text) {
        els.newText.focus();
        return;
      }
      closeModal();
      setStatus("创建中...");
      try {
        if (target === "daily") {
          await apiPost("/api/daily-tasks", { text, today: state.today, days: DAY_COUNT });
        } else {
          await apiPost("/api/todos", { text, dueDate: target, today: state.today });
        }
        els.newText.value = "";
        await refresh();
      } catch (error) {
        setStatus("创建失败：" + error.message, true);
        openModal();
      }
    }

    async function deleteDailyTask(task) {
      if (state.loading) return;
      setStatus("删除中...");
      try {
        await apiPost("/api/daily-tasks/delete", { id: task.id });
        await refresh();
      } catch (error) {
        setStatus("删除失败：" + error.message, true);
      }
    }

    async function updateDailyTaskPlacement(task, placement) {
      if (!task || state.loading) return;
      const normalized = placement === "bottom" ? "bottom" : "top";
      if ((task.placement || "top") === normalized) return;
      const current = state.dailyTasks.find((item) => item.id === task.id);
      if (current) current.placement = normalized;
      renderDailyTasks();
      setStatus("保存中...");
      state.loading = true;
      try {
        await apiPost("/api/daily-tasks/placement", { id: task.id, placement: normalized });
        await refresh({ preferId: selectedTodoId() });
      } catch (error) {
        setStatus("保存失败：" + error.message, true);
        await refresh({ preferId: selectedTodoId() });
      } finally {
        state.loading = false;
      }
    }

    function openModal() {
      if (isHelpOpen()) closeHelp({ returnFocus: false });
      if (isCompletedOpen()) closeCompleted({ returnFocus: false });
      renderDateOptions();
      renderDailyTasks();
      els.modalBackdrop.classList.add("open");
      window.setTimeout(() => {
        els.newText.focus();
        els.newText.select();
      }, 0);
    }

    function closeModal(options = {}) {
      els.modalBackdrop.classList.remove("open");
      if (options.returnFocus !== false) els.openNew.focus();
    }

    function openHelp() {
      if (isNewModalOpen()) closeModal({ returnFocus: false });
      if (isCompletedOpen()) closeCompleted({ returnFocus: false });
      state.helpMode = "manual";
      renderHelpContent();
      els.helpBackdrop.classList.add("open");
      window.setTimeout(() => {
        els.toggleHelpMode.focus();
      }, 0);
    }

    function closeHelp(options = {}) {
      els.helpBackdrop.classList.remove("open");
      if (options.returnFocus !== false) els.openHelp.focus();
    }

    function openCompleted() {
      if (isNewModalOpen()) closeModal({ returnFocus: false });
      if (isHelpOpen()) closeHelp({ returnFocus: false });
      if (isCheckinOpen()) closeCheckin({ returnFocus: false });
      renderCompletedList();
      els.completedBackdrop.classList.add("open");
      void loadCompletedTodos();
      window.setTimeout(() => {
        const restoreButton = els.completedList.querySelector(".restore-button");
        (restoreButton || els.closeCompleted).focus();
      }, 0);
    }

    function closeCompleted(options = {}) {
      els.completedBackdrop.classList.remove("open");
      if (options.returnFocus !== false) els.openCompleted.focus();
    }

    function openCheckin(task) {
      if (!task) return;
      if (isHelpOpen()) closeHelp({ returnFocus: false });
      if (isCompletedOpen()) closeCompleted({ returnFocus: false });
      state.checkinTaskId = task.id;
      renderCheckin();
      els.checkinBackdrop.classList.add("open");
      window.setTimeout(() => {
        const todayButton = els.checkinGrid.querySelector(".checkin-day.today") || els.checkinGrid.querySelector(".checkin-day");
        if (todayButton) todayButton.focus();
      }, 0);
    }

    function closeCheckin(options = {}) {
      els.checkinBackdrop.classList.remove("open");
      const taskId = state.checkinTaskId;
      state.checkinTaskId = null;
      if (options.returnFocus !== false) {
        const button = document.querySelector(`.daily-count-button[data-task-id="${CSS.escape(taskId || "")}"]`);
        if (button) button.focus();
      }
    }

    function renderCheckin() {
      const task = currentCheckinTask();
      els.checkinGrid.innerHTML = "";
      if (!task) return;

      const startDate = task.startDate || state.today;
      els.checkinTitle.textContent = task.text;
      els.checkinSummary.textContent = `打卡统计：${formatDailyTaskStats(task)}，可补打卡范围：${formatShortDate(startDate)} 至 ${formatShortDate(state.today)}`;

      for (const name of WEEKDAYS) {
        const weekday = document.createElement("div");
        weekday.className = "checkin-weekday";
        weekday.textContent = name;
        els.checkinGrid.appendChild(weekday);
      }

      const leading = parseDate(startDate).getDay();
      for (let index = 0; index < leading; index += 1) {
        const spacer = document.createElement("div");
        spacer.className = "checkin-spacer";
        els.checkinGrid.appendChild(spacer);
      }

      const checkedDates = new Set(Array.isArray(task.checkins) ? task.checkins : []);
      for (let date = startDate; date <= state.today; date = addDays(date, 1)) {
        const parsedDate = parseDate(date);
        const button = document.createElement("button");
        const checked = checkedDates.has(date);
        button.className = "checkin-day";
        if (checked) button.classList.add("checked");
        if (date === state.today) button.classList.add("today");
        button.type = "button";
        button.dataset.date = date;
        button.setAttribute("aria-pressed", checked ? "true" : "false");
        button.setAttribute("aria-label", `${formatShortDate(date)} ${checked ? "已打卡" : "未打卡"}`);
        button.innerHTML = `
          <span class="checkin-date">${parsedDate.getMonth() + 1}/${parsedDate.getDate()}</span>
          <span class="checkin-mark">${checked ? "✓" : ""}</span>
        `;
        button.addEventListener("click", () => toggleDailyCheckin(task, date, !checked));
        els.checkinGrid.appendChild(button);
      }
    }

    async function toggleDailyCheckin(task, date, checked) {
      if (!task || state.loading) return;
      const checkins = new Set(Array.isArray(task.checkins) ? task.checkins : []);
      if (checked) {
        checkins.add(date);
      } else {
        checkins.delete(date);
      }
      task.checkins = Array.from(checkins).sort();
      task.completedCount = task.checkins.length;
      task.totalCount = Math.max(0, daysBetween(task.startDate || state.today, state.today) + 1);
      renderDailyTasks();
      renderCheckin();
      setStatus("保存中...");
      state.loading = true;
      try {
        await apiPost("/api/daily-tasks/checkin", { id: task.id, date, checked, today: state.today });
        await refresh({ preferId: selectedTodoId() });
        renderCheckin();
      } catch (error) {
        setStatus("保存失败：" + error.message, true);
        await refresh({ preferId: selectedTodoId() });
        renderCheckin();
      } finally {
        state.loading = false;
      }
    }

    function toggleHelpMode() {
      state.helpMode = state.helpMode === "manual" ? "prompt" : "manual";
      renderHelpContent();
    }

    function renderHelpContent() {
      const promptMode = state.helpMode === "prompt";
      els.helpTitle.textContent = promptMode ? "Prompt版" : "使用说明";
      els.helpSubtitle.textContent = promptMode ? "可直接喂给 AI 生成同款软件" : "按当前代码整理的操作与规则";
      els.toggleHelpMode.textContent = promptMode ? "说明版" : "Prompt版";
      els.toggleHelpMode.setAttribute("aria-pressed", promptMode ? "true" : "false");
      els.helpContent.replaceChildren();

      if (promptMode) {
        const box = document.createElement("textarea");
        box.className = "help-prompt-box";
        box.readOnly = true;
        box.setAttribute("aria-label", "Todo 软件 Prompt");
        box.value = HELP_PROMPT;
        els.helpContent.appendChild(box);
        return;
      }

      for (const sectionData of HELP_MANUAL) {
        const section = document.createElement("section");
        section.className = "help-section";

        const title = document.createElement("h3");
        title.textContent = sectionData.title;

        const list = document.createElement("ul");
        for (const itemText of sectionData.items) {
          const item = document.createElement("li");
          item.textContent = itemText;
          list.appendChild(item);
        }

        section.appendChild(title);
        section.appendChild(list);
        els.helpContent.appendChild(section);
      }
    }

    function isNewModalOpen() {
      return els.modalBackdrop.classList.contains("open");
    }

    function isHelpOpen() {
      return els.helpBackdrop.classList.contains("open");
    }

    function isCheckinOpen() {
      return els.checkinBackdrop.classList.contains("open");
    }

    function isCompletedOpen() {
      return els.completedBackdrop.classList.contains("open");
    }

    function currentCheckinTask() {
      return state.dailyTasks.find((task) => task.id === state.checkinTaskId) || null;
    }

    function startEditingTodo(todo) {
      if (!todo || state.loading) return;
      endDrag();
      state.selected = todoSelection(todo.id);
      state.editingId = todo.id;
      state.editingText = todo.text;
      state.pendingEditFocusId = todo.id;
      render();
    }

    function cancelEditingTodo() {
      if (!state.editingId) return;
      clearEditingState();
      render();
    }

    async function saveEditingTodo(id, originalText) {
      if (state.editingId !== id) return;
      const text = normalizeTodoText(state.editingText);
      clearEditingState();
      if (!text) {
        render();
        setStatus("待办事项不能为空", true);
        return;
      }

      const current = state.todos.find((todo) => todo.id === id);
      if (current) current.text = text;
      render();

      if (text === normalizeTodoText(originalText)) return;

      setStatus("保存中...");
      state.loading = true;
      try {
        await apiPost("/api/todos/update", { id, text, today: state.today });
        await refresh({ preferId: selectedTodoId() || id });
      } catch (error) {
        const message = error.message;
        try {
          await refresh({ preferId: selectedTodoId() || id });
        } catch {}
        setStatus("保存失败：" + message, true);
      } finally {
        state.loading = false;
      }
    }

    function clearEditingState() {
      state.editingId = null;
      state.editingText = "";
      state.pendingEditFocusId = null;
    }

    function toggleGroup(key) {
      const collapsed = isCollapsed(key);
      state.collapsed[key] = !collapsed;
      saveCollapsed();
      render();
    }

    function selectTodo(id, options = {}) {
      state.selected = todoSelection(id);
      if (options.renderNow !== false) render();
      const node = document.querySelector(`.todo[data-id="${CSS.escape(id)}"]`);
      if (node) node.scrollIntoView({ block: "nearest" });
    }

    function selectGroup(key, options = {}) {
      state.selected = groupSelection(key);
      if (options.renderNow !== false) render();
      const node = document.querySelector(`.day[data-date="${CSS.escape(key)}"] .day-header`);
      if (node) node.scrollIntoView({ block: "nearest" });
    }

    function ensureSelected(preferId) {
      const items = navigationItems();
      if (preferId && items.some((item) => item.type === "todo" && item.id === preferId)) {
        state.selected = todoSelection(preferId);
        return;
      }
      if (state.selected && items.some((item) => isSameSelection(item, state.selected))) return;
      const todayFirst = items.find((item) => item.type === "todo" && todoById(item.id)?.dueDate === state.today);
      state.selected = todayFirst || items[0] || null;
    }

    function visibleTodos() {
      const byDate = orderedDates().filter(({ date }) => !isCollapsed(date));
      const visibleDates = new Set(byDate.map((item) => item.date));
      return [...state.todos]
        .filter((todo) => visibleDates.has(todo.dueDate) || (!isCollapsed(SHOPPING_GROUP) && todo.dueDate === SHOPPING_GROUP))
        .sort(sortTodos);
    }

    function navigationItems() {
      const items = [groupSelection(SHOPPING_GROUP)];
      if (!isCollapsed(SHOPPING_GROUP)) {
        for (const todo of todosForGroup(SHOPPING_GROUP)) items.push(todoSelection(todo.id));
      }
      for (const { date } of orderedDates()) {
        items.push(groupSelection(date));
        if (!isCollapsed(date)) {
          for (const todo of todosForGroup(date)) items.push(todoSelection(todo.id));
        }
      }
      return items;
    }

    function todoSelection(id) {
      return { type: "todo", id };
    }

    function groupSelection(key) {
      return { type: "group", key };
    }

    function isSameSelection(a, b) {
      if (!a || !b || a.type !== b.type) return false;
      return a.type === "todo" ? a.id === b.id : a.key === b.key;
    }

    function isSelectedTodo(id) {
      return state.selected?.type === "todo" && state.selected.id === id;
    }

    function isSelectedGroup(key = null) {
      if (key === null) return state.selected?.type === "group";
      return state.selected?.type === "group" && state.selected.key === key;
    }

    function selectedTodoId() {
      return state.selected?.type === "todo" ? state.selected.id : null;
    }

    function selectedTodo() {
      const id = selectedTodoId();
      return id ? todoById(id) : null;
    }

    function todoById(id) {
      return state.todos.find((todo) => todo.id === id) || null;
    }

    function groupKeyForTodo(todo) {
      return todo?.dueDate || state.today;
    }

    function todosForGroup(key) {
      return state.todos.filter((todo) => todo.dueDate === key).sort(sortTodos);
    }

    function orderedDates() {
      return Array.from({ length: DAY_COUNT }, (_, offset) => ({
        date: addDays(state.today, offset),
        offset,
      }));
    }

    function sortTodos(a, b) {
      return groupSortValue(a.dueDate) - groupSortValue(b.dueDate) || Number(a.sortOrder) - Number(b.sortOrder) || a.createdAt.localeCompare(b.createdAt);
    }

    function groupSortValue(key) {
      if (key === SHOPPING_GROUP) return -1;
      return parseDate(key).getTime();
    }

    function optimisticallyMove(id, direction) {
      return;
    }

    function optimisticallyMoveToEdge(id, edge) {
      return;
    }

    function writeDaySortOrders(orderedTodos) {
      orderedTodos.forEach((todo, index) => {
        todo.sortOrder = index * 1000;
      });
    }

    function handleDragOver(event) {
      if (!state.draggingId || state.editingId) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      const list = event.currentTarget;
      const target = resolveDropTarget(list, event.clientY, state.draggingId);
      setDropIndicator(list, target);
    }

    async function handleDrop(event) {
      event.preventDefault();
      if (state.editingId) return;
      const id = event.dataTransfer.getData("text/plain") || state.draggingId;
      if (!id) return;
      const list = event.currentTarget;
      const target = resolveDropTarget(list, event.clientY, id);
      const date = list.dataset.date;
      const sameDay = todosForGroup(date);
      const fromIndex = sameDay.findIndex((todo) => todo.id === id);
      if (fromIndex < 0) {
        endDrag();
        return;
      }
      if (!target || !target.targetId) {
        endDrag();
        return;
      }
      const filtered = sameDay.filter((todo) => todo.id !== id);
      const targetIndex = filtered.findIndex((todo) => todo.id === target.targetId);
      if (targetIndex < 0) {
        endDrag();
        return;
      }
      const desiredIndex = target.side === "after" ? targetIndex + 1 : targetIndex;
      if (desiredIndex === fromIndex) {
        endDrag();
        return;
      }
      const direction = desiredIndex < fromIndex ? "up" : "down";
      const steps = Math.abs(desiredIndex - fromIndex);
      state.selected = todoSelection(id);
      endDrag();
      for (let i = 0; i < steps; i++) optimisticallyMove(id, direction);
      render();
      try {
        for (let i = 0; i < steps; i++) {
          await apiPost("/api/todos/move", { id, direction, today: state.today });
        }
        await refresh({ preferId: id });
      } catch (error) {
        setStatus("拖动失败：" + error.message, true);
        await refresh({ preferId: id });
      }
    }

    function resolveDropTarget(list, clientY, draggingId) {
      const rows = Array.from(list.querySelectorAll(".todo")).filter((row) => row.dataset.id !== draggingId);
      if (!rows.length) return null;
      for (const row of rows) {
        const rect = row.getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) {
          return { targetId: row.dataset.id, side: "before" };
        }
      }
      return { targetId: rows[rows.length - 1].dataset.id, side: "after" };
    }

    function setDropIndicator(list, target) {
      if (state.dropTargetId === target?.targetId && state.dropSide === target?.side && state.dropDate === list.dataset.date) return;
      clearDropIndicator();
      state.dropDate = list.dataset.date;
      if (!target) {
        list.classList.add("drop-empty");
        return;
      }
      state.dropTargetId = target.targetId;
      state.dropSide = target.side;
      const row = document.querySelector(`.todo[data-id="${CSS.escape(target.targetId)}"]`);
      if (row) {
        row.classList.add("drop-target");
        row.classList.add(target.side === "before" ? "drop-before" : "drop-after");
      }
    }

    function clearDropIndicator() {
      if (state.dropDate) {
        const list = document.querySelector(`.todo-list[data-date="${CSS.escape(state.dropDate)}"]`);
        if (list) list.classList.remove("drop-empty");
      }
      if (state.dropTargetId) {
        const row = document.querySelector(`.todo[data-id="${CSS.escape(state.dropTargetId)}"]`);
        if (row) {
          row.classList.remove("drop-target", "drop-before", "drop-after");
        }
      }
      state.dropTargetId = null;
      state.dropSide = null;
      state.dropDate = null;
    }

    function endDrag() {
      clearDropIndicator();
      document.querySelectorAll(".todo.dragging").forEach((row) => row.classList.remove("dragging"));
      state.draggingId = null;
    }

    function focusEditingInput() {
      if (!state.pendingEditFocusId) return;
      const id = state.pendingEditFocusId;
      const input = document.querySelector(`.todo[data-id="${CSS.escape(id)}"] .todo-input`);
      if (!input) return;
      state.pendingEditFocusId = null;
      window.requestAnimationFrame(() => {
        if (state.editingId !== id) return;
        input.focus();
        input.select();
      });
    }

    function isCollapsed(key, offset = null) {
      if (Object.prototype.hasOwnProperty.call(state.collapsed, key)) return state.collapsed[key];
      if (key === SHOPPING_GROUP) return true;
      const resolvedOffset = offset ?? daysFromToday(key);
      return resolvedOffset > 2;
    }

    function groupLabel(date, offset) {
      if (offset === 0) return "今天";
      if (offset === 1) return "明天";
      if (offset === 2) return "后天";
      const parsed = parseDate(date);
      return `星期${WEEKDAYS[parsed.getDay()]}（${parsed.getFullYear()}年${parsed.getMonth() + 1}月${parsed.getDate()}日）`;
    }

    function createOptionLabel(date, offset) {
      const parsed = parseDate(date);
      const suffix = `（${parsed.getFullYear()}年${parsed.getMonth() + 1}月${parsed.getDate()}日）`;
      if (offset === 0) return "今天" + suffix;
      if (offset === 1) return "明天" + suffix;
      if (offset === 2) return "后天" + suffix;
      return `${offset}天后${suffix}`;
    }

    function formatFullDate(date) {
      const parsed = parseDate(date);
      return `${parsed.getFullYear()}年${parsed.getMonth() + 1}月${parsed.getDate()}日 星期${WEEKDAYS[parsed.getDay()]}`;
    }

    function formatShortDate(date) {
      const parsed = parseDate(date);
      return `${parsed.getFullYear()}年${parsed.getMonth() + 1}月${parsed.getDate()}日`;
    }

    function formatCompletedDueDate(value) {
      if (value === SHOPPING_GROUP) return "购物清单";
      if (!isDateString(value)) return "未知日期";
      const offset = daysFromToday(value);
      if (offset === 0) return "今天";
      if (offset === 1) return "明天";
      if (offset === 2) return "后天";
      return formatShortDate(value);
    }

    function formatTimestamp(value) {
      if (!value) return "未知时间";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");
      return `${year}年${month}月${day}日 ${hour}:${minute}`;
    }

    function parseDate(value) {
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function toLocalDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addDays(value, days) {
      const date = parseDate(value);
      date.setDate(date.getDate() + days);
      return toLocalDateString(date);
    }

    function daysFromToday(value) {
      if (value === SHOPPING_GROUP) return -1;
      return Math.round((parseDate(value).getTime() - parseDate(state.today).getTime()) / 86400000);
    }

    function daysBetween(startDate, endDate) {
      return Math.round((parseDate(endDate).getTime() - parseDate(startDate).getTime()) / 86400000);
    }

    function normalizeTodoText(value) {
      return String(value || "").trim().replace(/\s+/g, " ").slice(0, 240);
    }

    function isDateString(value) {
      return typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value);
    }

    function setStatus(message, error = false) {
      els.status.textContent = message;
      els.status.classList.toggle("error", error);
      if (!error && message === "已同步") {
        window.clearTimeout(setStatus.timer);
        setStatus.timer = window.setTimeout(() => {
          if (els.status.textContent === "已同步") els.status.textContent = "";
        }, 1400);
      }
    }

    async function apiGet(path) {
      const response = await fetch(API_BASE + path, {
        headers: { "X-Todo-Token": API_TOKEN },
        cache: "no-store",
      });
      return parseApiResponse(response);
    }

    async function apiPost(path, body) {
      const response = await fetch(API_BASE + path, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Todo-Token": API_TOKEN,
        },
        body: JSON.stringify(body),
      });
      return parseApiResponse(response);
    }

    async function parseApiResponse(response) {
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || response.statusText || "请求失败");
      return data;
    }

    function loadCollapsed() {
      try {
        return JSON.parse(localStorage.getItem("todo-collapsed-days") || "{}");
      } catch {
        return {};
      }
    }

    function saveCollapsed() {
      localStorage.setItem("todo-collapsed-days", JSON.stringify(state.collapsed));
    }

    function isTextEntryTarget(target) {
      return Boolean(target && target.closest && target.closest("input, textarea, select"));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
  </script>
