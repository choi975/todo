<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Todo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ec;
      --surface: #fffdfa;
      --line: #ddd4c3;
      --line-strong: #b8aa93;
      --text: #241f1a;
      --muted: #706759;
      --accent: #256d85;
      --accent-soft: #d9eef2;
      --complete: #2f7d4f;
      --shadow: 0 18px 48px rgba(50, 42, 30, 0.14);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(37, 109, 133, 0.08), transparent 220px),
        var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(920px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 52px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0 14px;
      background: linear-gradient(180deg, rgba(247, 244, 236, 0.96), rgba(247, 244, 236, 0.86));
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 780;
    }

    .date-stamp {
      color: var(--muted);
      font-size: 15px;
      white-space: nowrap;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .add-button,
    .help-button {
      width: 46px;
      height: 46px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 7px 18px rgba(42, 34, 24, 0.1);
    }

    .add-button {
      font-size: 0;
    }

    .add-button:hover,
    .add-button:focus-visible,
    .help-button:hover,
    .help-button:focus-visible {
      border-color: var(--accent);
      outline: 3px solid rgba(37, 109, 133, 0.18);
    }

    .add-button svg,
    .help-button svg {
      width: 24px;
      height: 24px;
      stroke-width: 2.4;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
      padding: 4px 2px 14px;
    }

    .status.error {
      color: #9b2c20;
    }

    .groups {
      display: grid;
      gap: 12px;
    }

    .day {
      background: rgba(255, 253, 250, 0.78);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 26px rgba(62, 50, 35, 0.08);
    }

    .day-header {
      width: 100%;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 56px;
      padding: 0 18px;
      cursor: pointer;
      color: var(--text);
      text-align: left;
    }

    .day-header:hover,
    .day-header:focus-visible {
      outline: none;
      background: rgba(37, 109, 133, 0.07);
    }

    .day-header.selected {
      background: var(--accent-soft);
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .day-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 760;
      font-size: 18px;
    }

    .chevron {
      width: 16px;
      height: 16px;
      transition: transform 150ms ease;
      flex: 0 0 auto;
    }

    .day.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .day-count {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .todo-list {
      display: grid;
      gap: 1px;
      padding: 0 10px 10px;
    }

    .day.collapsed .todo-list {
      display: none;
    }

    .todo {
      position: relative;
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      min-height: 48px;
      border-radius: 8px;
      padding: 3px 80px 3px 8px;
      background: transparent;
      border: 1px solid transparent;
      cursor: grab;
      user-select: none;
    }

    .todo:hover {
      background: rgba(36, 31, 26, 0.04);
    }

    .todo.selected {
      background: var(--accent-soft);
      border-color: rgba(37, 109, 133, 0.42);
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .todo.dragging {
      opacity: 0.48;
      cursor: grabbing;
    }

    .todo.editing {
      cursor: default;
      user-select: text;
    }

    .todo.drop-before::before,
    .todo.drop-after::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent);
      pointer-events: none;
    }

    .todo.drop-before::before {
      top: -2px;
    }

    .todo.drop-after::after {
      bottom: -2px;
    }

    .todo.drop-target {
      background: rgba(37, 109, 133, 0.08);
    }

    .todo-list.drop-empty {
      outline: 2px dashed rgba(37, 109, 133, 0.35);
      outline-offset: -6px;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--line-strong);
      border-radius: 4px;
      background: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
    }

    .checkbox:hover,
    .checkbox:focus-visible {
      border-color: var(--complete);
      outline: 3px solid rgba(47, 125, 79, 0.16);
    }

    .todo-text {
      font-size: 17px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .todo-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 7px 10px;
      background: #fff;
      color: var(--text);
      font-size: 17px;
      line-height: 1.35;
    }

    .todo-input:focus {
      outline: 3px solid rgba(37, 109, 133, 0.2);
      border-color: var(--accent);
    }

    .todo-actions {
      position: absolute;
      top: 50%;
      right: 8px;
      display: flex;
      gap: 4px;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease;
    }

    .todo-action {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 6px;
      background: rgba(37, 109, 133, 0.1);
      color: var(--accent);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: opacity 140ms ease, background 140ms ease, color 140ms ease;
    }

    .todo:hover .todo-actions,
    .todo.selected .todo-actions,
    .todo:focus-within .todo-actions {
      opacity: 1;
      pointer-events: auto;
    }

    .todo-action:hover,
    .todo-action:focus-visible {
      background: rgba(37, 109, 133, 0.18);
      outline: 3px solid rgba(37, 109, 133, 0.16);
    }

    .empty {
      padding: 7px 10px 12px 42px;
      color: var(--muted);
      font-size: 15px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(36, 31, 26, 0.34);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 58px;
      padding: 0 16px 0 20px;
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      font-weight: 760;
      font-size: 19px;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--text);
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      background: rgba(36, 31, 26, 0.06);
      outline: 3px solid rgba(37, 109, 133, 0.14);
    }

    .modal-body {
      padding: 18px 20px 20px;
      display: grid;
      gap: 14px;
    }

    .help-modal {
      width: min(760px, 100%);
      max-height: min(78vh, 820px);
      display: flex;
      flex-direction: column;
    }

    .help-head {
      align-items: flex-start;
      gap: 12px;
      padding-top: 12px;
      padding-bottom: 12px;
    }

    .help-title-wrap {
      min-width: 0;
      display: grid;
      gap: 4px;
      padding: 4px 0;
    }

    .help-subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .help-head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .help-mode-button {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .help-mode-button:hover,
    .help-mode-button:focus-visible {
      border-color: var(--accent);
      background: rgba(37, 109, 133, 0.08);
      outline: 3px solid rgba(37, 109, 133, 0.16);
    }

    .help-content {
      padding: 18px 20px 20px;
      display: grid;
      gap: 18px;
      overflow: auto;
    }

    .help-section {
      display: grid;
      gap: 8px;
    }

    .help-section h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
    }

    .help-section ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 7px;
    }

    .help-section li {
      line-height: 1.55;
      color: var(--text);
    }

    .help-prompt-box {
      width: 100%;
      min-height: 420px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 12px 13px;
      background: #fbf8f1;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      line-height: 1.55;
      resize: vertical;
    }

    .help-prompt-box:focus {
      outline: 3px solid rgba(37, 109, 133, 0.2);
      border-color: var(--accent);
    }

    .daily-panel {
      min-height: 116px;
      max-height: 190px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbf8f1;
      padding: 10px 12px;
    }

    .daily-panel-title {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .daily-items {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .daily-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 8px;
      min-height: 30px;
    }

    .daily-task-text {
      font-size: 15px;
      line-height: 1.35;
      overflow-wrap: anywhere;
      padding-top: 3px;
    }

    .daily-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .daily-action,
    .daily-delete {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .daily-action:hover,
    .daily-action:focus-visible,
    .daily-delete:hover,
    .daily-delete:focus-visible {
      background: rgba(37, 109, 133, 0.1);
      color: var(--accent);
      outline: 3px solid rgba(37, 109, 133, 0.14);
    }

    .daily-action.active {
      background: rgba(37, 109, 133, 0.16);
      color: var(--accent);
    }

    .daily-delete:hover,
    .daily-delete:focus-visible {
      background: rgba(155, 44, 32, 0.1);
      color: #9b2c20;
      outline: 3px solid rgba(155, 44, 32, 0.14);
    }

    .daily-empty {
      color: var(--muted);
      font-size: 15px;
    }

    .new-input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 0 13px;
      background: white;
      color: var(--text);
    }

    .new-input:focus {
      outline: 3px solid rgba(37, 109, 133, 0.2);
      border-color: var(--accent);
    }

    .form-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .date-select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 0 11px;
      background: white;
      color: var(--text);
    }

    .create-button {
      min-width: 92px;
      min-height: 42px;
      border: 1px solid #1d596d;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .create-button:hover,
    .create-button:focus-visible {
      background: #1d596d;
      outline: 3px solid rgba(37, 109, 133, 0.22);
    }

    @media (max-width: 560px) {
      .app {
        width: min(100vw - 20px, 920px);
        padding-top: 10px;
      }

      .brand {
        display: grid;
        gap: 5px;
      }

      .topbar-actions {
        gap: 6px;
      }

      .date-stamp {
        font-size: 13px;
      }

      .day-header {
        padding: 0 12px;
      }

      .day-title {
        font-size: 16px;
      }

      .todo {
        grid-template-columns: 32px 1fr;
        min-height: 46px;
        padding-right: 72px;
      }

      .todo-text {
        font-size: 16px;
      }

      .todo-input {
        font-size: 16px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .create-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="待办软件">
    <header class="topbar">
      <div class="brand">
        <h1>Todo</h1>
        <div class="date-stamp" id="todayLabel"></div>
      </div>
      <div class="topbar-actions">
        <button class="help-button" id="openHelp" type="button" title="使用说明" aria-label="打开使用说明">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="8.5"></circle>
            <path d="M9.8 9.2a2.5 2.5 0 1 1 4.4 1.6c-.85.73-1.45 1.27-1.45 2.48"></path>
            <path d="M12 17.2h.01"></path>
          </svg>
        </button>
        <button class="add-button" id="openNew" type="button" title="新建（Alt+N）">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
        </button>
      </div>
    </header>

    <div class="status" id="status" role="status" aria-live="polite"></div>
    <section class="groups" id="groups" aria-label="待办日期分组"></section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <section class="modal">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">新建</div>
        <button class="icon-button" id="closeNew" type="button" title="关闭">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M6 6l12 12"></path>
            <path d="M18 6L6 18"></path>
          </svg>
        </button>
      </div>
      <form class="modal-body" id="newForm">
        <div class="daily-panel" aria-label="每日任务">
          <div class="daily-panel-title">每日任务</div>
          <ul class="daily-items" id="dailyItems"></ul>
        </div>
        <input class="new-input" id="newText" autocomplete="off" maxlength="240" placeholder="输入待办事项">
        <div class="form-row">
          <select class="date-select" id="dateSelect"></select>
          <button class="create-button" type="submit">创建</button>
        </div>
      </form>
    </section>
  </div>

  <div class="modal-backdrop" id="helpBackdrop" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
    <section class="modal help-modal">
      <div class="modal-head help-head">
        <div class="help-title-wrap">
          <div class="modal-title" id="helpTitle">使用说明</div>
          <div class="help-subtitle" id="helpSubtitle">按当前代码整理的操作与规则</div>
        </div>
        <div class="help-head-actions">
          <button class="help-mode-button" id="toggleHelpMode" type="button">Prompt版</button>
          <button class="icon-button" id="closeHelp" type="button" title="关闭使用说明">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <path d="M6 6l12 12"></path>
              <path d="M18 6L6 18"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="help-content" id="helpContent"></div>
    </section>
  </div>

  <script>
    const API_BASE = "https://todo-codex.cai975301994.workers.dev";
    const API_TOKEN = "994f54aca15e4c02aa7c38102f1ac984";
    const DAY_COUNT = 31;
    const SHOPPING_GROUP = "__shopping__";
    const WEEKDAYS = ["日", "一", "二", "三", "四", "五", "六"];
    const HELP_MANUAL = [
      {
        title: "主界面",
        items: [
          "顶部会显示今天的中文日期，状态栏会提示同步、保存、创建或失败信息。",
          "列表固定分成两类：最上方是购物清单，下面是今天到未来 30 天，总共 31 天。",
          "购物清单默认折叠；三天后的日期分组也默认折叠，展开状态会保存在当前浏览器。"
        ],
      },
      {
        title: "新增任务",
        items: [
          "右上角加号或 Alt+N 打开新建窗口，输入内容后可选择每天、购物清单或具体日期。",
          "文本最长 240 个字符，系统会自动去掉首尾空格并合并多余空白。",
          "选择“每天”会生成一条每日任务，并在当前 31 天范围里每天生成一条对应待办；选择普通日期则只创建一次。"
        ],
      },
      {
        title: "普通待办操作",
        items: [
          "单击待办可选中，双击进入编辑；编辑时 Enter 保存，Escape 取消，失去焦点也会保存。",
          "点击左侧复选框，或在选中待办时按空格，可以把它标记为完成；完成后会从列表中消失。",
          "悬停右侧按钮或按数字 1 / 2 可以把当前待办置顶或置底；左右方向键会按一步上移或下移。",
          "拖拽只支持在同一个日期分组或同一个购物清单分组内调整顺序，不能跨天拖动。"
        ],
      },
      {
        title: "导航与折叠",
        items: [
          "上下方向键会在分组标题和待办之间移动选中项，方便整页键盘操作。",
          "选中分组标题时按空格，会展开或收起这个分组；直接点击分组标题也可以。",
          "按 Z 会把当前选中待办所在的分组折叠起来，并把选中移动到该分组标题。"
        ],
      },
      {
        title: "自动规则",
        items: [
          "任务文本只要以“买”开头，就会自动归入购物清单，即使创建时选的是别的日期；每日任务也遵守这条规则。",
          "未完成的普通待办如果已经过期，会自动顺延到今天；每日任务则按每日任务定义继续生成。",
          "每日任务可以设置成每天列表顶部或底部，这个位置规则会同步到所有未完成实例。",
          "如果多个普通待办在冒号 : 或 ： 之前拥有相同前缀，系统会尽量把它们排成连续的一组。"
        ],
      },
    ];
    const HELP_PROMPT = [
      "请生成一个和下面规格一致的中文 Todo 软件，前后端都要给出可运行代码。",
      "",
      "1. 技术与交付",
      "- 前端做成单文件 HTML，内联 CSS 和原生 JavaScript，不依赖框架。",
      "- 后端使用 Cloudflare Worker + D1，所有接口返回 JSON。",
      "- 前端通过可配置的 API_BASE 与 API_TOKEN 访问后端，并在状态栏显示“同步中 / 已同步 / 保存中 / 创建中 / 失败”等状态。",
      "",
      "2. 视觉与布局",
      "- 整体是克制、安静、偏纸张质感的暖米色界面，不要做营销页。",
      "- 页面主体宽度约 920px，顶部是 sticky top bar。",
      "- 左上显示标题 Todo 和今天的中文日期。",
      "- 右上有两个 46x46 的方形按钮：问号帮助按钮、加号新建按钮。",
      "- 主体内容是分组列表：最上方固定“购物清单”，下面是今天到未来 30 天。",
      "- 每个分组都是可折叠面板，标题显示中文日期名称和任务数量。",
      "- 待办行左侧是复选框，中间是文本，右侧悬浮按钮为置顶和置底。",
      "- 新建弹窗包含：每日任务列表、文本输入框、日期下拉、创建按钮。",
      "- 还要有一个帮助弹窗，默认显示使用说明，头部有“Prompt版 / 说明版”切换按钮，Prompt 版显示可直接复制给 AI 的提示词。",
      "",
      "3. 前端交互",
      "- 单击待办选中，双击进入编辑。",
      "- 编辑时 Enter 保存，Escape 取消，blur 自动保存。",
      "- 复选框或空格可以完成当前待办，完成后从当前列表消失。",
      "- Alt+N 打开新建弹窗；Escape 关闭当前弹窗。",
      "- ArrowUp / ArrowDown 在分组标题和待办之间移动选中项。",
      "- 选中待办时 ArrowLeft / ArrowRight 按一步上移 / 下移。",
      "- 数字 1 置顶，数字 2 置底。",
      "- 选中分组标题时按空格，切换展开 / 收起。",
      "- Z 折叠当前选中待办所在分组，并把选中移动到分组标题。",
      "- 支持拖拽排序，但只允许在同一分组内拖动。",
      "- 折叠状态保存到 localStorage。",
      "- 初次加载时优先选中今天的第一条待办；如果今天没有，再选中第一个可见项目。",
      "- 购物清单默认折叠，三天后的日期默认折叠。",
      "",
      "4. 业务规则",
      "- 视图范围固定为今天加未来 30 天，总共 31 天。",
      "- 日期标题依次使用：今天、明天、后天、星期X（YYYY年M月D日）。",
      "- 新建日期下拉包含：每天、购物清单、今天到 30 天后。",
      "- 选择“每天”时，创建一条 daily task，并在当前 31 天范围内为每天生成一条待办实例。",
      "- daily task 拥有 top / bottom 位置属性，切换后会影响所有未完成实例在每天列表中的自动落位。",
      "- 文本以“买”开头的任务，无论是普通任务还是每日任务实例，都自动归入购物清单分组。",
      "- 未完成且已过期的普通待办自动顺延到今天。",
      "- 文本在 : 或 ： 之前有相同前缀的普通待办，应尽量在非每日任务区形成连续分组。",
      "- 正常排序分三段：每日置顶任务、普通任务与前缀组、每日置底任务。",
      "- 手动移动过的每日任务实例要标记为手动排序，避免再次被自动规则覆盖；除非用户重新修改该 daily task 的 top / bottom 属性。",
      "- 普通待办完成后做“完成”，不是直接物理删除。",
      "- 创建和编辑都要做 trim，并把多个连续空白压成一个空格，文本长度上限 240。",
      "",
      "5. API 设计",
      "- GET /api/state?today=YYYY-MM-DD&days=31 返回 { today, days, todos, dailyTasks }。",
      "- POST /api/todos body: { text, dueDate, today }。",
      "- POST /api/daily-tasks body: { text, today, days }。",
      "- POST /api/daily-tasks/delete body: { id }。",
      "- POST /api/todos/complete body: { id }。",
      "- POST /api/todos/update body: { id, text, today }。",
      "- POST /api/todos/top body: { id, today }。",
      "- POST /api/todos/bottom body: { id, today }。",
      "- POST /api/todos/move body: { id, direction, today }。",
      "- POST /api/daily-tasks/placement body: { id, placement }。",
      "- 出错时返回 { error }，前端把错误展示到状态栏。",
      "",
      "6. 数据字段",
      "- todo: id, text, dueDate, sortOrder, sourceDailyTaskId, createdAt, manualSort。",
      "- dailyTask: id, text, sortOrder, placement, createdAt。",
      "",
      "请直接输出完整实现代码，默认中文界面，交互细节严格按以上规则落地。"
    ].join("\n");

    const state = {
      today: toLocalDateString(new Date()),
      todos: [],
      dailyTasks: [],
      collapsed: loadCollapsed(),
      selected: null,
      editingId: null,
      editingText: "",
      pendingEditFocusId: null,
      helpMode: "manual",
      loading: false,
      draggingId: null,
      dropTargetId: null,
      dropSide: null,
      dropDate: null,
    };

    const els = {
      groups: document.getElementById("groups"),
      status: document.getElementById("status"),
      todayLabel: document.getElementById("todayLabel"),
      openHelp: document.getElementById("openHelp"),
      openNew: document.getElementById("openNew"),
      closeNew: document.getElementById("closeNew"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      helpBackdrop: document.getElementById("helpBackdrop"),
      helpTitle: document.getElementById("helpTitle"),
      helpSubtitle: document.getElementById("helpSubtitle"),
      toggleHelpMode: document.getElementById("toggleHelpMode"),
      closeHelp: document.getElementById("closeHelp"),
      helpContent: document.getElementById("helpContent"),
      newForm: document.getElementById("newForm"),
      newText: document.getElementById("newText"),
      dateSelect: document.getElementById("dateSelect"),
      dailyItems: document.getElementById("dailyItems"),
    };

    els.todayLabel.textContent = formatFullDate(state.today);
    els.openHelp.addEventListener("click", openHelp);
    els.openNew.addEventListener("click", openModal);
    els.closeNew.addEventListener("click", closeModal);
    els.modalBackdrop.addEventListener("mousedown", (event) => {
      if (event.target === els.modalBackdrop) closeModal();
    });
    els.helpBackdrop.addEventListener("mousedown", (event) => {
      if (event.target === els.helpBackdrop) closeHelp();
    });
    els.toggleHelpMode.addEventListener("click", toggleHelpMode);
    els.closeHelp.addEventListener("click", closeHelp);
    els.newForm.addEventListener("submit", submitNewItem);
    document.addEventListener("keydown", handleKeys);

    renderDateOptions();
    renderHelpContent();
    refresh();

    async function refresh(options = {}) {
      setStatus("同步中...");
      try {
        state.loading = true;
        const data = await apiGet(`/api/state?today=${state.today}&days=${DAY_COUNT}`);
        state.todos = Array.isArray(data.todos) ? data.todos : [];
        state.dailyTasks = Array.isArray(data.dailyTasks) ? data.dailyTasks : [];
        ensureSelected(options.preferId);
        render();
        setStatus("已同步");
      } catch (error) {
        setStatus("同步失败：" + error.message, true);
      } finally {
        state.loading = false;
      }
    }

    function render() {
      renderDailyTasks();
      els.groups.innerHTML = "";
      renderGroup({
        key: SHOPPING_GROUP,
        label: "购物清单",
        todos: todosForGroup(SHOPPING_GROUP),
        offset: null,
      });
      for (let offset = 0; offset < DAY_COUNT; offset++) {
        const date = addDays(state.today, offset);
        renderGroup({
          key: date,
          label: groupLabel(date, offset),
          todos: todosForGroup(date),
          offset,
        });
      }
      focusEditingInput();
    }

    function renderGroup({ key, label, todos, offset }) {
      const day = document.createElement("article");
      day.className = "day";
      day.dataset.date = key;

      if (isCollapsed(key, offset)) day.classList.add("collapsed");

      const header = document.createElement("button");
      header.className = "day-header";
      if (isSelectedGroup(key)) header.classList.add("selected");
      header.type = "button";
      header.innerHTML = `
        <span class="day-title">
          <svg class="chevron" viewBox="0 0 20 20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 4l8 6-8 6"></path>
          </svg>
          <span>${escapeHtml(label)}</span>
        </span>
        <span class="day-count">${todos.length} 项</span>
      `;
      header.addEventListener("click", () => {
        selectGroup(key, { renderNow: false });
        toggleGroup(key);
      });
      day.appendChild(header);

      const list = document.createElement("div");
      list.className = "todo-list";
      list.dataset.date = key;
      list.addEventListener("dragover", handleDragOver);
      list.addEventListener("drop", handleDrop);

      if (todos.length) {
        for (const todo of todos) list.appendChild(renderTodo(todo));
      } else {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "没有待办事项";
        list.appendChild(empty);
      }

      day.appendChild(list);
      els.groups.appendChild(day);
    }

    function renderTodo(todo) {
      const row = document.createElement("div");
      const isEditing = todo.id === state.editingId;
      row.className = "todo";
      if (isSelectedTodo(todo.id)) row.classList.add("selected");
      if (todo.id === state.draggingId) row.classList.add("dragging");
      if (isEditing) row.classList.add("editing");
      row.dataset.id = todo.id;
      row.draggable = !isEditing;
      row.tabIndex = -1;
      row.addEventListener("click", (event) => {
        if (!event.target.closest(".checkbox") && !event.target.closest(".todo-input") && !event.target.closest(".todo-action")) selectTodo(todo.id);
      });
      row.addEventListener("dblclick", (event) => {
        if (event.target.closest(".checkbox") || event.target.closest(".todo-input") || event.target.closest(".todo-action")) return;
        startEditingTodo(todo);
      });
      row.addEventListener("dragstart", (event) => {
        state.draggingId = todo.id;
        row.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", todo.id);
        clearDropIndicator();
      });
      row.addEventListener("dragend", () => {
        endDrag();
      });

      const checkbox = document.createElement("button");
      checkbox.className = "checkbox";
      checkbox.type = "button";
      checkbox.title = "完成（Space）";
      checkbox.setAttribute("aria-label", "完成：" + todo.text);
      checkbox.addEventListener("click", (event) => {
        event.stopPropagation();
        completeSelected(todo.id);
      });

      row.appendChild(checkbox);
      if (isEditing) {
        const input = document.createElement("input");
        input.className = "todo-input";
        input.type = "text";
        input.maxLength = 240;
        input.autocomplete = "off";
        input.value = state.editingText;
        input.setAttribute("aria-label", "编辑待办事项");
        input.addEventListener("click", (event) => event.stopPropagation());
        input.addEventListener("dblclick", (event) => event.stopPropagation());
        input.addEventListener("input", () => {
          state.editingText = input.value;
        });
        let handled = false;
        const finish = async (mode) => {
          if (handled) return;
          handled = true;
          if (mode === "save") {
            await saveEditingTodo(todo.id, todo.text);
            return;
          }
          cancelEditingTodo();
        };
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            void finish("save");
          }
          if (event.key === "Escape") {
            event.preventDefault();
            void finish("cancel");
          }
        });
        input.addEventListener("blur", () => {
          void finish("save");
        });
        row.appendChild(input);
        return row;
      }

      const text = document.createElement("div");
      text.className = "todo-text";
      text.textContent = todo.text;
      row.appendChild(text);

      const actions = document.createElement("div");
      actions.className = "todo-actions";

      const pinTop = document.createElement("button");
      pinTop.className = "todo-action";
      pinTop.type = "button";
      pinTop.title = "置顶（1）";
      pinTop.setAttribute("aria-label", "置顶：" + todo.text);
      pinTop.innerHTML = `
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 18V6"></path>
          <path d="M7 11l5-5 5 5"></path>
          <path d="M5 4h14"></path>
        </svg>
      `;
      pinTop.addEventListener("click", (event) => {
        event.stopPropagation();
        void moveTodoToEdge(todo.id, "top");
      });

      const pinBottom = document.createElement("button");
      pinBottom.className = "todo-action";
      pinBottom.type = "button";
      pinBottom.title = "置底（2）";
      pinBottom.setAttribute("aria-label", "置底：" + todo.text);
      pinBottom.innerHTML = `
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 6v12"></path>
          <path d="M7 13l5 5 5-5"></path>
          <path d="M5 20h14"></path>
        </svg>
      `;
      pinBottom.addEventListener("click", (event) => {
        event.stopPropagation();
        void moveTodoToEdge(todo.id, "bottom");
      });

      actions.appendChild(pinTop);
      actions.appendChild(pinBottom);
      row.appendChild(actions);
      return row;
    }

    function renderDailyTasks() {
      els.dailyItems.innerHTML = "";
      if (!state.dailyTasks.length) {
        const empty = document.createElement("li");
        empty.className = "daily-empty";
        empty.textContent = "暂无每日任务";
        els.dailyItems.appendChild(empty);
        return;
      }
      for (const task of state.dailyTasks) {
        const item = document.createElement("li");
        item.className = "daily-row";

        const text = document.createElement("div");
        text.className = "daily-task-text";
        text.textContent = task.text;

        const actions = document.createElement("div");
        actions.className = "daily-actions";

        const top = createDailyActionButton({
          className: "daily-action" + ((task.placement || "top") === "top" ? " active" : ""),
          title: "每日任务置顶",
          label: "每日任务置顶：" + task.text,
          icon: `
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 18V6"></path>
              <path d="M7 11l5-5 5 5"></path>
              <path d="M5 4h14"></path>
            </svg>
          `,
          onClick: () => updateDailyTaskPlacement(task, "top"),
        });

        const bottom = createDailyActionButton({
          className: "daily-action" + ((task.placement || "top") === "bottom" ? " active" : ""),
          title: "每日任务置底",
          label: "每日任务置底：" + task.text,
          icon: `
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 6v12"></path>
              <path d="M7 13l5 5 5-5"></path>
              <path d="M5 20h14"></path>
            </svg>
          `,
          onClick: () => updateDailyTaskPlacement(task, "bottom"),
        });

        const remove = document.createElement("button");
        remove.className = "daily-delete";
        remove.type = "button";
        remove.title = "删除每日任务";
        remove.setAttribute("aria-label", "删除每日任务：" + task.text);
        remove.innerHTML = `
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"></path>
            <path d="M8 6V4h8v2"></path>
            <path d="M19 6l-1 14H6L5 6"></path>
            <path d="M10 11v5"></path>
            <path d="M14 11v5"></path>
          </svg>
        `;
        remove.addEventListener("click", () => deleteDailyTask(task));

        item.appendChild(text);
        actions.appendChild(top);
        actions.appendChild(bottom);
        actions.appendChild(remove);
        item.appendChild(actions);
        els.dailyItems.appendChild(item);
      }
    }

    function createDailyActionButton({ className, title, label, icon, onClick }) {
      const button = document.createElement("button");
      button.className = className;
      button.type = "button";
      button.title = title;
      button.setAttribute("aria-label", label);
      button.innerHTML = icon;
      button.addEventListener("click", onClick);
      return button;
    }

    function renderDateOptions() {
      els.dateSelect.innerHTML = "";
      const daily = new Option("每天", "daily");
      els.dateSelect.add(daily);
      els.dateSelect.add(new Option("购物清单", SHOPPING_GROUP));
      for (let offset = 0; offset <= 30; offset++) {
        const date = addDays(state.today, offset);
        els.dateSelect.add(new Option(createOptionLabel(date, offset), date));
      }
      els.dateSelect.value = state.today;
    }

    function handleKeys(event) {
      const newModalOpen = isNewModalOpen();
      const helpModalOpen = isHelpOpen();
      if (event.altKey && event.key.toLowerCase() === "n" && !helpModalOpen) {
        event.preventDefault();
        openModal();
        return;
      }
      if (event.key === "Escape" && helpModalOpen) {
        event.preventDefault();
        closeHelp();
        return;
      }
      if (event.key === "Escape" && newModalOpen) {
        event.preventDefault();
        closeModal();
        return;
      }
      if (newModalOpen || helpModalOpen) return;
      if (isTextEntryTarget(event.target) || state.editingId) return;
      const isPinShortcut = !event.ctrlKey && !event.metaKey && !event.altKey && !event.shiftKey && (event.key === "1" || event.code === "Numpad1");
      const isBottomShortcut = !event.ctrlKey && !event.metaKey && !event.altKey && !event.shiftKey && (event.key === "2" || event.code === "Numpad2");
      const isCollapseShortcut = !event.ctrlKey && !event.metaKey && !event.altKey && !event.shiftKey && event.key.toLowerCase() === "z";
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(event.key) || isPinShortcut || isBottomShortcut || isCollapseShortcut) {
        event.preventDefault();
      }
      if (event.key === "ArrowUp") moveSelection(-1);
      if (event.key === "ArrowDown") moveSelection(1);
      if (event.key === "ArrowLeft" && selectedTodoId()) moveSelectedTodo("up");
      if (event.key === "ArrowRight" && selectedTodoId()) moveSelectedTodo("down");
      if (event.key === " ") activateSelected();
      if (isPinShortcut) moveTodoToEdge(selectedTodoId(), "top");
      if (isBottomShortcut) moveTodoToEdge(selectedTodoId(), "bottom");
      if (isCollapseShortcut) collapseSelectedTodoGroup();
    }

    function moveSelection(delta) {
      const items = navigationItems();
      if (!items.length) {
        state.selected = null;
        render();
        return;
      }
      const currentIndex = Math.max(0, items.findIndex((item) => isSameSelection(item, state.selected)));
      const nextIndex = clamp(currentIndex + delta, 0, items.length - 1);
      setSelection(items[nextIndex]);
    }

    function setSelection(selection) {
      if (!selection) {
        state.selected = null;
        render();
        return;
      }
      if (selection.type === "todo") {
        selectTodo(selection.id);
        return;
      }
      selectGroup(selection.key);
    }

    async function moveSelectedTodo(direction) {
      const id = selectedTodoId();
      if (!id || state.loading || state.editingId) return;
      optimisticallyMove(id, direction);
      render();
      try {
        await apiPost("/api/todos/move", { id, direction, today: state.today });
        await refresh({ preferId: id });
      } catch (error) {
        setStatus("移动失败：" + error.message, true);
        await refresh({ preferId: id });
      }
    }

    async function moveTodoToEdge(id, edge) {
      if (!id || state.loading || state.editingId) return;
      selectTodo(id, { renderNow: false });
      optimisticallyMoveToEdge(id, edge);
      render();
      try {
        await apiPost(edge === "bottom" ? "/api/todos/bottom" : "/api/todos/top", { id, today: state.today });
        await refresh({ preferId: id });
      } catch (error) {
        setStatus((edge === "bottom" ? "置底失败：" : "置顶失败：") + error.message, true);
        await refresh({ preferId: id });
      }
    }

    async function completeSelected(id) {
      if (!id || state.loading || state.editingId) return;
      const items = navigationItems();
      const currentIndex = Math.max(0, items.findIndex((item) => item.type === "todo" && item.id === id));
      const fallback = items[currentIndex + 1] || items[currentIndex - 1] || null;
      state.todos = state.todos.filter((todo) => todo.id !== id);
      state.selected = fallback || null;
      render();
      try {
        await apiPost("/api/todos/complete", { id });
        await refresh({ preferId: selectedTodoId() });
      } catch (error) {
        setStatus("完成失败：" + error.message, true);
        await refresh();
      }
    }

    function activateSelected() {
      if (isSelectedGroup()) {
        toggleGroup(state.selected.key);
        return;
      }
      completeSelected(selectedTodoId());
    }

    function collapseSelectedTodoGroup() {
      const todo = selectedTodo();
      if (!todo) return;
      const key = groupKeyForTodo(todo);
      state.collapsed[key] = true;
      saveCollapsed();
      selectGroup(key, { renderNow: false });
      render();
    }

    async function submitNewItem(event) {
      event.preventDefault();
      const text = els.newText.value.trim();
      const target = els.dateSelect.value;
      if (!text) {
        els.newText.focus();
        return;
      }
      closeModal();
      setStatus("创建中...");
      try {
        if (target === "daily") {
          await apiPost("/api/daily-tasks", { text, today: state.today, days: DAY_COUNT });
        } else {
          await apiPost("/api/todos", { text, dueDate: target, today: state.today });
        }
        els.newText.value = "";
        await refresh();
      } catch (error) {
        setStatus("创建失败：" + error.message, true);
        openModal();
      }
    }

    async function deleteDailyTask(task) {
      if (state.loading) return;
      setStatus("删除中...");
      try {
        await apiPost("/api/daily-tasks/delete", { id: task.id });
        await refresh();
      } catch (error) {
        setStatus("删除失败：" + error.message, true);
      }
    }

    async function updateDailyTaskPlacement(task, placement) {
      if (!task || state.loading) return;
      const normalized = placement === "bottom" ? "bottom" : "top";
      if ((task.placement || "top") === normalized) return;
      const current = state.dailyTasks.find((item) => item.id === task.id);
      if (current) current.placement = normalized;
      renderDailyTasks();
      setStatus("保存中...");
      state.loading = true;
      try {
        await apiPost("/api/daily-tasks/placement", { id: task.id, placement: normalized });
        await refresh({ preferId: selectedTodoId() });
      } catch (error) {
        setStatus("保存失败：" + error.message, true);
        await refresh({ preferId: selectedTodoId() });
      } finally {
        state.loading = false;
      }
    }

    function openModal() {
      if (isHelpOpen()) closeHelp({ returnFocus: false });
      renderDateOptions();
      renderDailyTasks();
      els.modalBackdrop.classList.add("open");
      window.setTimeout(() => {
        els.newText.focus();
        els.newText.select();
      }, 0);
    }

    function closeModal(options = {}) {
      els.modalBackdrop.classList.remove("open");
      if (options.returnFocus !== false) els.openNew.focus();
    }

    function openHelp() {
      if (isNewModalOpen()) closeModal({ returnFocus: false });
      state.helpMode = "manual";
      renderHelpContent();
      els.helpBackdrop.classList.add("open");
      window.setTimeout(() => {
        els.toggleHelpMode.focus();
      }, 0);
    }

    function closeHelp(options = {}) {
      els.helpBackdrop.classList.remove("open");
      if (options.returnFocus !== false) els.openHelp.focus();
    }

    function toggleHelpMode() {
      state.helpMode = state.helpMode === "manual" ? "prompt" : "manual";
      renderHelpContent();
    }

    function renderHelpContent() {
      const promptMode = state.helpMode === "prompt";
      els.helpTitle.textContent = promptMode ? "Prompt版" : "使用说明";
      els.helpSubtitle.textContent = promptMode ? "可直接喂给 AI 生成同款软件" : "按当前代码整理的操作与规则";
      els.toggleHelpMode.textContent = promptMode ? "说明版" : "Prompt版";
      els.toggleHelpMode.setAttribute("aria-pressed", promptMode ? "true" : "false");
      els.helpContent.replaceChildren();

      if (promptMode) {
        const box = document.createElement("textarea");
        box.className = "help-prompt-box";
        box.readOnly = true;
        box.setAttribute("aria-label", "Todo 软件 Prompt");
        box.value = HELP_PROMPT;
        els.helpContent.appendChild(box);
        return;
      }

      for (const sectionData of HELP_MANUAL) {
        const section = document.createElement("section");
        section.className = "help-section";

        const title = document.createElement("h3");
        title.textContent = sectionData.title;

        const list = document.createElement("ul");
        for (const itemText of sectionData.items) {
          const item = document.createElement("li");
          item.textContent = itemText;
          list.appendChild(item);
        }

        section.appendChild(title);
        section.appendChild(list);
        els.helpContent.appendChild(section);
      }
    }

    function isNewModalOpen() {
      return els.modalBackdrop.classList.contains("open");
    }

    function isHelpOpen() {
      return els.helpBackdrop.classList.contains("open");
    }

    function startEditingTodo(todo) {
      if (!todo || state.loading) return;
      endDrag();
      state.selected = todoSelection(todo.id);
      state.editingId = todo.id;
      state.editingText = todo.text;
      state.pendingEditFocusId = todo.id;
      render();
    }

    function cancelEditingTodo() {
      if (!state.editingId) return;
      clearEditingState();
      render();
    }

    async function saveEditingTodo(id, originalText) {
      if (state.editingId !== id) return;
      const text = normalizeTodoText(state.editingText);
      clearEditingState();
      if (!text) {
        render();
        setStatus("待办事项不能为空", true);
        return;
      }

      const current = state.todos.find((todo) => todo.id === id);
      if (current) current.text = text;
      render();

      if (text === normalizeTodoText(originalText)) return;

      setStatus("保存中...");
      state.loading = true;
      try {
        await apiPost("/api/todos/update", { id, text, today: state.today });
        await refresh({ preferId: selectedTodoId() || id });
      } catch (error) {
        const message = error.message;
        try {
          await refresh({ preferId: selectedTodoId() || id });
        } catch {}
        setStatus("保存失败：" + message, true);
      } finally {
        state.loading = false;
      }
    }

    function clearEditingState() {
      state.editingId = null;
      state.editingText = "";
      state.pendingEditFocusId = null;
    }

    function toggleGroup(key) {
      const collapsed = isCollapsed(key);
      state.collapsed[key] = !collapsed;
      saveCollapsed();
      render();
    }

    function selectTodo(id, options = {}) {
      state.selected = todoSelection(id);
      if (options.renderNow !== false) render();
      const node = document.querySelector(`.todo[data-id="${CSS.escape(id)}"]`);
      if (node) node.scrollIntoView({ block: "nearest" });
    }

    function selectGroup(key, options = {}) {
      state.selected = groupSelection(key);
      if (options.renderNow !== false) render();
      const node = document.querySelector(`.day[data-date="${CSS.escape(key)}"] .day-header`);
      if (node) node.scrollIntoView({ block: "nearest" });
    }

    function ensureSelected(preferId) {
      const items = navigationItems();
      if (preferId && items.some((item) => item.type === "todo" && item.id === preferId)) {
        state.selected = todoSelection(preferId);
        return;
      }
      if (state.selected && items.some((item) => isSameSelection(item, state.selected))) return;
      const todayFirst = items.find((item) => item.type === "todo" && todoById(item.id)?.dueDate === state.today);
      state.selected = todayFirst || items[0] || null;
    }

    function visibleTodos() {
      const byDate = orderedDates().filter(({ date }) => !isCollapsed(date));
      const visibleDates = new Set(byDate.map((item) => item.date));
      return [...state.todos]
        .filter((todo) => visibleDates.has(todo.dueDate) || (!isCollapsed(SHOPPING_GROUP) && todo.dueDate === SHOPPING_GROUP))
        .sort(sortTodos);
    }

    function navigationItems() {
      const items = [groupSelection(SHOPPING_GROUP)];
      if (!isCollapsed(SHOPPING_GROUP)) {
        for (const todo of todosForGroup(SHOPPING_GROUP)) items.push(todoSelection(todo.id));
      }
      for (const { date } of orderedDates()) {
        items.push(groupSelection(date));
        if (!isCollapsed(date)) {
          for (const todo of todosForGroup(date)) items.push(todoSelection(todo.id));
        }
      }
      return items;
    }

    function todoSelection(id) {
      return { type: "todo", id };
    }

    function groupSelection(key) {
      return { type: "group", key };
    }

    function isSameSelection(a, b) {
      if (!a || !b || a.type !== b.type) return false;
      return a.type === "todo" ? a.id === b.id : a.key === b.key;
    }

    function isSelectedTodo(id) {
      return state.selected?.type === "todo" && state.selected.id === id;
    }

    function isSelectedGroup(key = null) {
      if (key === null) return state.selected?.type === "group";
      return state.selected?.type === "group" && state.selected.key === key;
    }

    function selectedTodoId() {
      return state.selected?.type === "todo" ? state.selected.id : null;
    }

    function selectedTodo() {
      const id = selectedTodoId();
      return id ? todoById(id) : null;
    }

    function todoById(id) {
      return state.todos.find((todo) => todo.id === id) || null;
    }

    function groupKeyForTodo(todo) {
      return todo?.dueDate || state.today;
    }

    function todosForGroup(key) {
      return state.todos.filter((todo) => todo.dueDate === key).sort(sortTodos);
    }

    function orderedDates() {
      return Array.from({ length: DAY_COUNT }, (_, offset) => ({
        date: addDays(state.today, offset),
        offset,
      }));
    }

    function sortTodos(a, b) {
      return groupSortValue(a.dueDate) - groupSortValue(b.dueDate) || Number(a.sortOrder) - Number(b.sortOrder) || a.createdAt.localeCompare(b.createdAt);
    }

    function groupSortValue(key) {
      if (key === SHOPPING_GROUP) return -1;
      return parseDate(key).getTime();
    }

    function optimisticallyMove(id, direction) {
      const current = state.todos.find((todo) => todo.id === id);
      if (!current) return;
      const sameDay = todosForGroup(groupKeyForTodo(current));
      const index = sameDay.findIndex((todo) => todo.id === id);
      const targetIndex = direction === "up" ? index - 1 : index + 1;
      if (targetIndex < 0 || targetIndex >= sameDay.length) return;
      const reordered = sameDay.slice();
      const [moved] = reordered.splice(index, 1);
      reordered.splice(targetIndex, 0, moved);
      writeDaySortOrders(reordered);
    }

    function optimisticallyMoveToEdge(id, edge) {
      const current = state.todos.find((todo) => todo.id === id);
      if (!current) return;
      const sameDay = todosForGroup(groupKeyForTodo(current));
      const index = sameDay.findIndex((todo) => todo.id === id);
      if ((edge === "top" && index <= 0) || (edge === "bottom" && index === sameDay.length - 1)) return;
      const reordered = sameDay.slice();
      const [moved] = reordered.splice(index, 1);
      if (edge === "bottom") {
        reordered.push(moved);
      } else {
        reordered.unshift(moved);
      }
      writeDaySortOrders(reordered);
    }

    function writeDaySortOrders(orderedTodos) {
      orderedTodos.forEach((todo, index) => {
        todo.sortOrder = index * 1000;
      });
    }

    function handleDragOver(event) {
      if (!state.draggingId || state.editingId) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      const list = event.currentTarget;
      const target = resolveDropTarget(list, event.clientY, state.draggingId);
      setDropIndicator(list, target);
    }

    async function handleDrop(event) {
      event.preventDefault();
      if (state.editingId) return;
      const id = event.dataTransfer.getData("text/plain") || state.draggingId;
      if (!id) return;
      const list = event.currentTarget;
      const target = resolveDropTarget(list, event.clientY, id);
      const date = list.dataset.date;
      const sameDay = todosForGroup(date);
      const fromIndex = sameDay.findIndex((todo) => todo.id === id);
      if (fromIndex < 0) {
        endDrag();
        return;
      }
      if (!target || !target.targetId) {
        endDrag();
        return;
      }
      const filtered = sameDay.filter((todo) => todo.id !== id);
      const targetIndex = filtered.findIndex((todo) => todo.id === target.targetId);
      if (targetIndex < 0) {
        endDrag();
        return;
      }
      const desiredIndex = target.side === "after" ? targetIndex + 1 : targetIndex;
      if (desiredIndex === fromIndex) {
        endDrag();
        return;
      }
      const direction = desiredIndex < fromIndex ? "up" : "down";
      const steps = Math.abs(desiredIndex - fromIndex);
      state.selected = todoSelection(id);
      endDrag();
      for (let i = 0; i < steps; i++) optimisticallyMove(id, direction);
      render();
      try {
        for (let i = 0; i < steps; i++) {
          await apiPost("/api/todos/move", { id, direction, today: state.today });
        }
        await refresh({ preferId: id });
      } catch (error) {
        setStatus("拖动失败：" + error.message, true);
        await refresh({ preferId: id });
      }
    }

    function resolveDropTarget(list, clientY, draggingId) {
      const rows = Array.from(list.querySelectorAll(".todo")).filter((row) => row.dataset.id !== draggingId);
      if (!rows.length) return null;
      for (const row of rows) {
        const rect = row.getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) {
          return { targetId: row.dataset.id, side: "before" };
        }
      }
      return { targetId: rows[rows.length - 1].dataset.id, side: "after" };
    }

    function setDropIndicator(list, target) {
      if (state.dropTargetId === target?.targetId && state.dropSide === target?.side && state.dropDate === list.dataset.date) return;
      clearDropIndicator();
      state.dropDate = list.dataset.date;
      if (!target) {
        list.classList.add("drop-empty");
        return;
      }
      state.dropTargetId = target.targetId;
      state.dropSide = target.side;
      const row = document.querySelector(`.todo[data-id="${CSS.escape(target.targetId)}"]`);
      if (row) {
        row.classList.add("drop-target");
        row.classList.add(target.side === "before" ? "drop-before" : "drop-after");
      }
    }

    function clearDropIndicator() {
      if (state.dropDate) {
        const list = document.querySelector(`.todo-list[data-date="${CSS.escape(state.dropDate)}"]`);
        if (list) list.classList.remove("drop-empty");
      }
      if (state.dropTargetId) {
        const row = document.querySelector(`.todo[data-id="${CSS.escape(state.dropTargetId)}"]`);
        if (row) {
          row.classList.remove("drop-target", "drop-before", "drop-after");
        }
      }
      state.dropTargetId = null;
      state.dropSide = null;
      state.dropDate = null;
    }

    function endDrag() {
      clearDropIndicator();
      document.querySelectorAll(".todo.dragging").forEach((row) => row.classList.remove("dragging"));
      state.draggingId = null;
    }

    function focusEditingInput() {
      if (!state.pendingEditFocusId) return;
      const id = state.pendingEditFocusId;
      const input = document.querySelector(`.todo[data-id="${CSS.escape(id)}"] .todo-input`);
      if (!input) return;
      state.pendingEditFocusId = null;
      window.requestAnimationFrame(() => {
        if (state.editingId !== id) return;
        input.focus();
        input.select();
      });
    }

    function isCollapsed(key, offset = null) {
      if (Object.prototype.hasOwnProperty.call(state.collapsed, key)) return state.collapsed[key];
      if (key === SHOPPING_GROUP) return true;
      const resolvedOffset = offset ?? daysFromToday(key);
      return resolvedOffset > 2;
    }

    function groupLabel(date, offset) {
      if (offset === 0) return "今天";
      if (offset === 1) return "明天";
      if (offset === 2) return "后天";
      const parsed = parseDate(date);
      return `星期${WEEKDAYS[parsed.getDay()]}（${parsed.getFullYear()}年${parsed.getMonth() + 1}月${parsed.getDate()}日）`;
    }

    function createOptionLabel(date, offset) {
      const parsed = parseDate(date);
      const suffix = `（${parsed.getFullYear()}年${parsed.getMonth() + 1}月${parsed.getDate()}日）`;
      if (offset === 0) return "今天" + suffix;
      if (offset === 1) return "明天" + suffix;
      if (offset === 2) return "后天" + suffix;
      return `${offset}天后${suffix}`;
    }

    function formatFullDate(date) {
      const parsed = parseDate(date);
      return `${parsed.getFullYear()}年${parsed.getMonth() + 1}月${parsed.getDate()}日 星期${WEEKDAYS[parsed.getDay()]}`;
    }

    function parseDate(value) {
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function toLocalDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addDays(value, days) {
      const date = parseDate(value);
      date.setDate(date.getDate() + days);
      return toLocalDateString(date);
    }

    function daysFromToday(value) {
      if (value === SHOPPING_GROUP) return -1;
      return Math.round((parseDate(value).getTime() - parseDate(state.today).getTime()) / 86400000);
    }

    function normalizeTodoText(value) {
      return String(value || "").trim().replace(/\s+/g, " ").slice(0, 240);
    }

    function setStatus(message, error = false) {
      els.status.textContent = message;
      els.status.classList.toggle("error", error);
      if (!error && message === "已同步") {
        window.clearTimeout(setStatus.timer);
        setStatus.timer = window.setTimeout(() => {
          if (els.status.textContent === "已同步") els.status.textContent = "";
        }, 1400);
      }
    }

    async function apiGet(path) {
      const response = await fetch(API_BASE + path, {
        headers: { "X-Todo-Token": API_TOKEN },
        cache: "no-store",
      });
      return parseApiResponse(response);
    }

    async function apiPost(path, body) {
      const response = await fetch(API_BASE + path, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Todo-Token": API_TOKEN,
        },
        body: JSON.stringify(body),
      });
      return parseApiResponse(response);
    }

    async function parseApiResponse(response) {
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || response.statusText || "请求失败");
      return data;
    }

    function loadCollapsed() {
      try {
        return JSON.parse(localStorage.getItem("todo-collapsed-days") || "{}");
      } catch {
        return {};
      }
    }

    function saveCollapsed() {
      localStorage.setItem("todo-collapsed-days", JSON.stringify(state.collapsed));
    }

    function isTextEntryTarget(target) {
      return Boolean(target && target.closest && target.closest("input, textarea, select"));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
  </script>
</body>
